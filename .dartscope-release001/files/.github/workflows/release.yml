name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "README.md"
      - "CHANGELOG.md"
      - "SECURITY.md"
      - "docs/release-process.md"
      - "docs/support-matrix.md"
      - "tools/check-release-packages.py"
      - "tools/publish-crates.sh"
      - "tools/release-crates.txt"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      publish:
        description: Publish all crates from the selected version tag
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Test and package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - name: Verify formatting
        run: cargo fmt --all --check
      - name: Test workspace
        run: cargo test --workspace --locked --quiet
      - name: Test umbrella all features
        run: cargo test -p dartscope --all-features --locked --quiet
      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked
      - name: Validate release packages
        run: python3 tools/check-release-packages.py
      - name: Validate publishing script
        run: bash -n tools/publish-crates.sh
      - uses: actions/upload-artifact@v4
        with:
          name: dartscope-${{ github.sha }}-crates
          path: target/package/*.crate
          if-no-files-found: error

  publish:
    name: Publish crates.io release
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.publish &&
      startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
      - name: Publish in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: tools/publish-crates.sh
