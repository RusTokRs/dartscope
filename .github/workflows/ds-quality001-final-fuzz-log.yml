name: Inspect Final DS-QUALITY-001 Fuzz Failure

on:
  issues:
    types: [opened]

permissions:
  actions: read
  issues: write

jobs:
  inspect:
    if: github.event.issue.title == '[internal] inspect final DS-QUALITY-001 fuzz failure'
    runs-on: ubuntu-latest
    steps:
      - name: Download compact failure log
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/jobs/88135318206/logs" > job.log
          { grep -Ei 'error|failed|unexpected|usage|manifest|format|lock|warning' job.log || true; echo '--- tail ---'; tail -n 80 job.log; } > compact.log
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const text = fs.readFileSync('compact.log', 'utf8').slice(-60000);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `\`\`\`text\n${text}\n\`\`\``,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
