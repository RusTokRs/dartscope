name: Capture Loop Comment Validation

on:
  pull_request:

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy
      - name: Capture validation
        run: |
          set +e
          {
            python3 tools/apply-loop-statement-comments.py
            echo "patch_status=$?"
            rustfmt +1.95.0 --edition 2024 \
              crates/dartscope-parse/src/lexical_regions/controls.rs \
              crates/dartscope-parse/tests/commented_statement_for.rs \
              crates/dartscope-index/tests/commented_statement_for_resolution.rs
            echo "rustfmt_status=$?"
            cargo +1.95.0 test -p dartscope-parse -p dartscope-index --locked
            echo "tests_status=$?"
            cargo +1.95.0 clippy --workspace --all-targets --locked -- -D warnings
            echo "clippy_status=$?"
            git diff --check
            echo "diff_status=$?"
          } > loop-comment-validation.txt 2>&1
          cat loop-comment-validation.txt
      - name: Upload diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: loop-comment-validation
          path: loop-comment-validation.txt
          if-no-files-found: error
          retention-days: 1
