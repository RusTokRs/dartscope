name: Inspect DS-QUALITY-001 V8 Finalize Error

on:
  issues:
    types: [opened]

permissions:
  contents: write
  actions: read
  issues: write

jobs:
  inspect:
    if: github.event.issue.title == '[internal] inspect DS-QUALITY-001 v8 finalize error'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
      - name: Remove one-shot inspector
        shell: bash
        run: |
          rm -f .github/workflows/ds-quality001-v8-error-inspect.yml
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "ci: inspect DS-QUALITY-001 v8 finalize error"
          git push origin HEAD:main
      - name: Report compact error context
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const response = await github.request('GET /repos/{owner}/{repo}/actions/jobs/{job_id}/logs', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              job_id: 88110078646,
            });
            const text = typeof response.data === 'string'
              ? response.data
              : Buffer.from(response.data).toString('utf8');
            const lines = text.split(/\r?\n/);
            const matches = lines.filter(line => /error|failed|fatal|rejected|nothing to commit|Traceback|##\[error\]/i.test(line));
            const excerpt = [...matches.slice(-40), '--- tail ---', ...lines.slice(-45)].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `\`\`\`text\n${excerpt.slice(-50000)}\n\`\`\``,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
