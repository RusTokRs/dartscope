name: Inspect DS-QUALITY-001 Index Property Error

on:
  issues:
    types: [opened]

permissions:
  actions: read
  contents: write
  issues: write

jobs:
  inspect:
    if: github.event.issue.title == '[internal] inspect DS-QUALITY-001 index property error'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
      - name: Extract exact failure
        shell: bash
        env:
          EXPECTED_PARENT: cbadbc98def7bef5455f7c8f24bf6858edffcf5c
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = "$EXPECTED_PARENT"
          curl --fail --location --silent --show-error \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/88213983325/logs" \
            --output "$RUNNER_TEMP/job.log"
          {
            echo 'FILTERED'
            grep -E -i '(^|[^a-z])(error:|warning:|failed|failure|panicked|mismatch|not equal|unexpected|repository consistency|changed paths|process completed)' "$RUNNER_TEMP/job.log" | tail -n 100 || true
            echo
            echo 'FINAL'
            tail -n 50 "$RUNNER_TEMP/job.log"
          } > "$RUNNER_TEMP/extract.log"
      - name: Remove inspector and report
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          LOG_PATH: ${{ runner.temp }}/extract.log
        with:
          script: |
            const fs = require('fs');
            const { execFileSync } = require('child_process');
            execFileSync('git', ['config', 'user.name', 'dartscope-ci']);
            execFileSync('git', ['config', 'user.email', 'actions@users.noreply.github.com']);
            execFileSync('git', ['rm', '.github/workflows/ds-quality001-index-properties-error-inspector.yml']);
            execFileSync('git', ['commit', '-m', 'ci: remove index property error inspector']);
            execFileSync('git', ['push', 'origin', 'HEAD:main']);
            const sha = execFileSync('git', ['rev-parse', 'HEAD'], {encoding: 'utf8'}).trim();
            const log = fs.readFileSync(process.env.LOG_PATH, 'utf8');
            await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: `clean_sha=${sha}\n\n\`\`\`text\n${log}\n\`\`\``});
            await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, state: 'closed'});
