name: Diagnose DS-INDEX-005 Library Cache Compile

on:
  issues:
    types: [opened]

permissions:
  contents: read

concurrency:
  group: ds-index005-library-compile-diagnostic
  cancel-in-progress: false

jobs:
  diagnose:
    name: Diagnose (${{ matrix.os }})
    if: github.event.issue.title == '[internal] DS-INDEX-005 library cache compile diagnostic'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: python3
          - os: windows-latest
            python: python
    runs-on: ${{ matrix.os }}
    outputs:
      ubuntu_log: ${{ steps.capture.outputs.ubuntu_log }}
      windows_log: ${{ steps.capture.outputs.windows_log }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Capture exact focused-test output
        id: capture
        shell: bash
        run: |
          set +e
          LOG="$RUNNER_TEMP/library-cache-compile.log"
          git show 23b9f8fe98570b1032757979eba8ba4ca1d34f19:tools/ds_index005_library_cache_apply_v2.py > "$RUNNER_TEMP/apply.py"
          "${{ matrix.python }}" "$RUNNER_TEMP/apply.py" > "$LOG" 2>&1
          APPLY_STATUS=$?
          if [ "$APPLY_STATUS" -eq 0 ]; then
            rm -f .github/workflows/ds-index005-library-compile-diagnostic.yml
            rm -f docs/development/ds-index005-library-v2-failure.md
            rustup toolchain install 1.95.0 --profile minimal --component rustfmt >> "$LOG" 2>&1
            INSTALL_STATUS=$?
          else
            INSTALL_STATUS=0
          fi
          if [ "$APPLY_STATUS" -eq 0 ] && [ "$INSTALL_STATUS" -eq 0 ]; then
            cargo fmt --all >> "$LOG" 2>&1
            cargo test -p dartscope-index per_library_graphql_cache_rebuilds_only_the_affected_use_library --locked -- --nocapture >> "$LOG" 2>&1
            TEST_STATUS=$?
          else
            TEST_STATUS=0
          fi
          ENCODED=$("${{ matrix.python }}" -c 'import base64,sys; print(base64.b64encode(open(sys.argv[1],"rb").read()[-30000:]).decode())' "$LOG")
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            echo "ubuntu_log=$ENCODED" >> "$GITHUB_OUTPUT"
          else
            echo "windows_log=$ENCODED" >> "$GITHUB_OUTPUT"
          fi

  record:
    name: Record compile diagnostic
    if: always() && github.event.issue.title == '[internal] DS-INDEX-005 library cache compile diagnostic'
    needs: diagnose
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Write diagnostic
        env:
          UBUNTU_LOG: ${{ needs.diagnose.outputs.ubuntu_log }}
          WINDOWS_LOG: ${{ needs.diagnose.outputs.windows_log }}
        shell: bash
        run: |
          rm -f .github/workflows/ds-index005-library-compile-diagnostic.yml
          rm -f docs/development/ds-index005-library-v2-failure.md
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path
          def decode(name):
              value = os.environ.get(name, '')
              return base64.b64decode(value).decode('utf-8', errors='replace') if value else '(missing output)'
          report = f'''---
id: doc://docs/development/ds-index005-library-compile-diagnostic.md
kind: verification_report
language: en
source_language: en
status: active
---

# DS-INDEX-005 Library Cache Compile Diagnostic

## Ubuntu

```text
{decode("UBUNTU_LOG")}
```

## Windows

```text
{decode("WINDOWS_LOG")}
```
'''
          Path('docs/development/ds-index005-library-compile-diagnostic.md').write_text(report, encoding='utf-8')
          PY
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "ci: capture DS-INDEX-005 library compile diagnostic"
          git push origin HEAD:main
      - name: Close trigger issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
