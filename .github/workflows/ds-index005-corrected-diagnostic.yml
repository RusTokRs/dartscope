name: Diagnose Corrected DS-INDEX-005 Gate

on:
  issues:
    types: [opened]

permissions:
  contents: read

concurrency:
  group: ds-index005-corrected-diagnostic
  cancel-in-progress: false

jobs:
  ubuntu:
    name: Ubuntu Clippy diagnostic
    if: github.event.issue.title == '[internal] DS-INDEX-005 corrected diagnostic'
    runs-on: ubuntu-latest
    outputs:
      stage: ${{ steps.diagnose.outputs.stage }}
      log: ${{ steps.diagnose.outputs.log }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Capture Ubuntu failure
        id: diagnose
        shell: bash
        run: |
          set +e
          LOG="$RUNNER_TEMP/ubuntu.log"
          : > "$LOG"
          STAGE="apply corrected semantics"
          git show 7d258bbefc0d8268c8170100469bb7e50691693f:tools/ds_index005_semantic_fix.py > "$RUNNER_TEMP/apply.py"
          python3 "$RUNNER_TEMP/apply.py" >> "$LOG" 2>&1
          STATUS=$?
          if [ "$STATUS" -eq 0 ]; then
            python3 - <<'PY' >> "$LOG" 2>&1
          from pathlib import Path
          path = Path('crates/dartscope-index/src/incremental.rs')
          text = path.read_text(encoding='utf-8')
          old = '''    references_by_path
              .iter()
              .filter_map(|(path, references)| {
                  references
                      .iter()
                      .any(|reference| names.contains(&reference.name))
                      .then(|| path.clone())
              })
              .collect()
          '''
          new = '''    references_by_path
              .iter()
              .filter(|(_, references)| {
                  references
                      .iter()
                      .any(|reference| names.contains(&reference.name))
              })
              .map(|(path, _)| path.clone())
              .collect()
          '''
          if text.count(old) != 1:
              raise SystemExit(f'filter/map anchor count: {text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
            STATUS=$?
          fi
          if [ "$STATUS" -eq 0 ]; then
            STAGE="install Rust 1.95"
            rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy >> "$LOG" 2>&1
            STATUS=$?
          fi
          if [ "$STATUS" -eq 0 ]; then
            STAGE="format"
            cargo fmt --all >> "$LOG" 2>&1
            STATUS=$?
          fi
          if [ "$STATUS" -eq 0 ]; then
            STAGE="Clippy"
            cargo clippy --workspace --all-targets --locked -- -D warnings >> "$LOG" 2>&1
            STATUS=$?
          fi
          if [ "$STATUS" -eq 0 ]; then STAGE="success"; fi
          echo "stage=$STAGE (exit $STATUS)" >> "$GITHUB_OUTPUT"
          ENCODED=$(python3 -c 'import base64,sys; print(base64.b64encode(open(sys.argv[1],"rb").read()[-24000:]).decode())' "$LOG")
          echo "log=$ENCODED" >> "$GITHUB_OUTPUT"

  windows:
    name: Windows matrix diagnostic
    if: github.event.issue.title == '[internal] DS-INDEX-005 corrected diagnostic'
    runs-on: windows-latest
    outputs:
      stage: ${{ steps.diagnose.outputs.stage }}
      log: ${{ steps.diagnose.outputs.log }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Capture Windows failure
        id: diagnose
        shell: bash
        run: |
          set +e
          LOG="$RUNNER_TEMP/windows.log"
          : > "$LOG"
          STAGE="apply corrected semantics"
          git show 7d258bbefc0d8268c8170100469bb7e50691693f:tools/ds_index005_semantic_fix.py > "$RUNNER_TEMP/apply.py"
          python "$RUNNER_TEMP/apply.py" >> "$LOG" 2>&1
          STATUS=$?
          if [ "$STATUS" -eq 0 ]; then
            python - <<'PY' >> "$LOG" 2>&1
          from pathlib import Path
          path = Path('crates/dartscope-index/src/incremental.rs')
          text = path.read_text(encoding='utf-8')
          old = '''    references_by_path
              .iter()
              .filter_map(|(path, references)| {
                  references
                      .iter()
                      .any(|reference| names.contains(&reference.name))
                      .then(|| path.clone())
              })
              .collect()
          '''
          new = '''    references_by_path
              .iter()
              .filter(|(_, references)| {
                  references
                      .iter()
                      .any(|reference| names.contains(&reference.name))
              })
              .map(|(path, _)| path.clone())
              .collect()
          '''
          if text.count(old) != 1:
              raise SystemExit(f'filter/map anchor count: {text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
            STATUS=$?
          fi
          if [ "$STATUS" -eq 0 ]; then
            STAGE="install Rust 1.95"
            rustup toolchain install 1.95.0 --profile minimal --component rustfmt >> "$LOG" 2>&1
            STATUS=$?
          fi
          if [ "$STATUS" -eq 0 ]; then
            STAGE="format"
            cargo fmt --all >> "$LOG" 2>&1
            STATUS=$?
          fi
          if [ "$STATUS" -eq 0 ]; then
            STAGE="format check"
            cargo fmt --all -- --check >> "$LOG" 2>&1
            STATUS=$?
          fi
          if [ "$STATUS" -eq 0 ]; then
            STAGE="workspace tests"
            cargo test --workspace --locked --quiet >> "$LOG" 2>&1
            STATUS=$?
          fi
          if [ "$STATUS" -eq 0 ]; then
            STAGE="workspace all-targets"
            cargo check --workspace --all-targets --locked >> "$LOG" 2>&1
            STATUS=$?
          fi
          if [ "$STATUS" -eq 0 ]; then
            STAGE="umbrella minimal"
            cargo check -p dartscope --no-default-features --locked >> "$LOG" 2>&1
            STATUS=$?
          fi
          if [ "$STATUS" -eq 0 ]; then
            STAGE="umbrella all-features"
            cargo check -p dartscope --all-features --locked >> "$LOG" 2>&1
            STATUS=$?
          fi
          if [ "$STATUS" -eq 0 ]; then STAGE="success"; fi
          echo "stage=$STAGE (exit $STATUS)" >> "$GITHUB_OUTPUT"
          ENCODED=$(python -c 'import base64,sys; print(base64.b64encode(open(sys.argv[1],"rb").read()[-24000:]).decode())' "$LOG")
          echo "log=$ENCODED" >> "$GITHUB_OUTPUT"

  record:
    name: Record exact corrected diagnostics
    if: always() && github.event.issue.title == '[internal] DS-INDEX-005 corrected diagnostic'
    needs: [ubuntu, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Write diagnostic report
        env:
          UBUNTU_STAGE: ${{ needs.ubuntu.outputs.stage }}
          UBUNTU_LOG: ${{ needs.ubuntu.outputs.log }}
          WINDOWS_STAGE: ${{ needs.windows.outputs.stage }}
          WINDOWS_LOG: ${{ needs.windows.outputs.log }}
        shell: bash
        run: |
          rm -f .github/workflows/ds-index005-corrected-diagnostic.yml
          rm -f docs/development/ds-index005-final-failure.md
          mkdir -p docs/development
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path
          def decode(name):
              value = os.environ.get(name, '')
              if not value:
                  return '(no log output)'
              return base64.b64decode(value).decode('utf-8', errors='replace')
          report = f'''---
          id: doc://docs/development/ds-index005-corrected-diagnostic.md
          kind: verification_report
          language: en
          source_language: en
          status: active
          ---

          # DS-INDEX-005 Corrected Diagnostic

          - Ubuntu stage: `{os.environ.get("UBUNTU_STAGE", "missing")}`
          - Windows stage: `{os.environ.get("WINDOWS_STAGE", "missing")}`

          ## Ubuntu log

          ```text
          {decode("UBUNTU_LOG")}
          ```

          ## Windows log

          ```text
          {decode("WINDOWS_LOG")}
          ```
          '''
          Path('docs/development/ds-index005-corrected-diagnostic.md').write_text(report, encoding='utf-8')
          PY
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "ci: capture corrected DS-INDEX-005 diagnostics"
          git push origin HEAD:main
      - name: Close diagnostic issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
