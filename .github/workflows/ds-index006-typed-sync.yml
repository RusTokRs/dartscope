name: DS-INDEX-006 typed synchronize finalizer

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  finalize:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'ds-index006-typed-references'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Apply exact Clippy fix
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('crates/dartscope-parse/src/identifier_references/typed.rs')
          text = path.read_text()
          old = '''            if parens == 0 && brackets == 0 && angles == 0 && supports_clause(kind, token.text) {
                if let Some(range_start) = current.replace(token.end) {
                    ranges.push(ClauseRange {
                        start: range_start,
                        end: token.start,
                    });
                }
            }
'''
          new = '''            if parens == 0
                && brackets == 0
                && angles == 0
                && supports_clause(kind, token.text)
                && let Some(range_start) = current.replace(token.end)
            {
                ranges.push(ClauseRange {
                    start: range_start,
                    end: token.start,
                });
            }
'''
          if new not in text:
              if old not in text:
                  raise SystemExit('Clippy fix anchor missing')
              path.write_text(text.replace(old, new, 1))
          PY
          rm -f tools/.ds-index006-clippy-diagnose
          cargo fmt --all

      - name: Verify full workspace Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Commit verified fix
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/dartscope-parse/src/identifier_references/typed.rs
          git add -u tools/.ds-index006-clippy-diagnose
          git commit -m "fix: satisfy full workspace Clippy"
          git push origin "HEAD:${HEAD_REF}"

      - name: Report success
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.number }}" --body "clippy_fix=success branch_sha=$(git rev-parse HEAD)"
