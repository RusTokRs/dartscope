name: Finalize Verified DS-QUALITY-001 Non-Workflow Files

on:
  issues:
    types: [opened]

permissions:
  actions: read
  contents: write
  issues: write

jobs:
  finalize:
    if: github.event.issue.title == '[internal] finalize verified DS-QUALITY-001 non-workflow files'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
      - name: Download exact verified artifact
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/8435482414/zip" \
            -o verified.zip
          echo "c5b7e4f7e48caf31bb5e130fffa7370372bb59689b5a4d0c3cc35a04860d99b3  verified.zip" | sha256sum -c -
          mkdir verified
          unzip -q verified.zip -d verified
      - name: Copy verified non-workflow tree
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import shutil

          root = Path.cwd()
          verified = root / "verified"
          for source in verified.rglob("*"):
              if not source.is_file():
                  continue
              relative = source.relative_to(verified)
              if relative.parts[:2] == (".github", "workflows"):
                  continue
              target = root / relative
              target.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(source, target)
          PY
          rm -rf verified verified.zip
          rm -f docs/development/.fuzz-snapshot-trigger
          rm -f tools/ds_quality001_fuzz_apply.py
          rm -f tools/.ds_quality001_fuzz_payload_*
      - name: Verify focused final tree
        shell: bash
        run: |
          rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy
          rustup toolchain install nightly-2026-07-01 --profile minimal
          cargo fmt --all -- --check
          cargo test -p dartscope-parse --features fuzzing --locked --quiet
          cargo clippy -p dartscope-parse --all-targets --features fuzzing --locked -- -D warnings
          cargo +nightly-2026-07-01 check --manifest-path fuzz/Cargo.toml --all-targets --locked
      - name: Commit verified non-workflow files
        id: commit
        shell: bash
        run: |
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --name-only | grep -E '^\.github/workflows/'; then
            echo "refusing to stage workflow changes"
            exit 1
          fi
          git diff --cached --check
          git commit -m "ci: add bounded fuzz corpus gates"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `sha=${{ steps.commit.outputs.sha }}`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
