name: Capture Nested Loop Patch

on:
  pull_request:

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Capture patch diagnostics
        run: |
          set +e
          python3 tools/apply-nested-loop-statements.py > nested-loop-patch.txt 2>&1
          status=$?
          echo "status=$status" >> nested-loop-patch.txt
          cat nested-loop-patch.txt
      - name: Upload diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nested-loop-patch
          path: nested-loop-patch.txt
          if-no-files-found: error
          retention-days: 1
