name: Capture Nested Loop Actionlint

on:
  pull_request:

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install actionlint 1.7.12
        env:
          GOBIN: ${{ runner.temp }}/actionlint-bin
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$GOBIN" >> "$GITHUB_PATH"
      - name: Capture diagnostics
        run: |
          set +e
          actionlint -no-color -oneline .github/workflows/apply-nested-loop-statements.yml \
            > nested-loop-actionlint.txt 2>&1
          status=$?
          echo "status=$status" >> nested-loop-actionlint.txt
          cat nested-loop-actionlint.txt
      - name: Upload diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nested-loop-actionlint
          path: nested-loop-actionlint.txt
          if-no-files-found: error
          retention-days: 1
