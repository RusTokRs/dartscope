name: Finalize DS-INDEX-005 Per-Library Caches V3

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ds-index005-library-cache-v3-finalize
  cancel-in-progress: false

jobs:
  quality:
    name: Rust 1.95 quality and release gate
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == '[internal] DS-INDEX-005 per-library cache finalizer retry 3'
    runs-on: ubuntu-latest
    outputs:
      failed_stage: ${{ steps.gate.outputs.failed_stage }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Run observable per-library v3 gate
        id: gate
        env:
          GOBIN: ${{ runner.temp }}/actionlint-bin
        shell: bash
        run: |
          set +e
          FAILED_STAGE=""
          run_stage() {
            local name="$1"
            shift
            echo "===== $name ====="
            "$@"
            local status=$?
            if [ "$status" -ne 0 ]; then
              FAILED_STAGE="$name (exit $status)"
              return "$status"
            fi
          }

          run_stage "apply per-library cache v3" python3 tools/ds_index005_library_cache_apply_v3.py || true
          if [ -z "$FAILED_STAGE" ]; then
            rm -f .github/workflows/ds-index005-library-cache-v3-finalize.yml
            rm -f tools/ds_index005_library_cache_apply_v3.py
            rm -f docs/development/ds-index005-library-ubuntu-diagnostic.md
            rm -f docs/development/ds-index005-library-v3-failure.md
            run_stage "install actionlint" go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12 || true
          fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "actionlint" "$GOBIN/actionlint" -color || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "workflow policy tests" python3 -m unittest discover -s tools/tests -p 'test_*.py' -v || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "workflow policy" python3 tools/check-workflow-policy.py || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "install Rust 1.95" rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "format" cargo fmt --all || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "format check" cargo fmt --all -- --check || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "per-library GraphQL fixture" cargo test -p dartscope-index per_library_graphql_cache_rebuilds_only_the_affected_use_library --locked --quiet || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "GraphQL NotVisible fixture" cargo test -p dartscope-index graphql_not_visible_evidence_rebuilds_without_a_uri_edge --locked --quiet || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "GraphQL part-library fixture" cargo test -p dartscope-index graphql_cache_groups_operation_uses_by_part_library --locked --quiet || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "index tests" cargo test -p dartscope-index --locked --quiet || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "incremental scale baseline" cargo run -p dartscope-index --example incremental_workspace_baseline --release --locked || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "Clippy" cargo clippy --workspace --all-targets --locked -- -D warnings || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "rustdoc" env RUSTDOCFLAGS=-Dwarnings cargo doc --workspace --no-deps --locked || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "workspace tests" cargo test --workspace --locked --quiet || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "umbrella all-features" cargo test -p dartscope --all-features --locked --quiet || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "repository consistency" python3 tools/check-repository-consistency.py || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "release packages" python3 tools/check-release-packages.py || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "publish script syntax" bash -n tools/publish-crates.sh || true; fi
          echo "failed_stage=$FAILED_STAGE" >> "$GITHUB_OUTPUT"
          if [ -n "$FAILED_STAGE" ]; then exit 1; fi

  matrix:
    name: Rust 1.95 (${{ matrix.os }})
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == '[internal] DS-INDEX-005 per-library cache finalizer retry 3'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Apply per-library v3 slice in the worktree
        shell: bash
        run: |
          python tools/ds_index005_library_cache_apply_v3.py
          rm -f .github/workflows/ds-index005-library-cache-v3-finalize.yml
          rm -f tools/ds_index005_library_cache_apply_v3.py
          rm -f docs/development/ds-index005-library-ubuntu-diagnostic.md
          rm -f docs/development/ds-index005-library-v3-failure.md
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt
      - name: Run Linux and Windows gates
        shell: bash
        run: |
          cargo fmt --all
          cargo fmt --all -- --check
          cargo test --workspace --locked --quiet
          cargo check --workspace --all-targets --locked
          cargo check -p dartscope --no-default-features --locked
          cargo check -p dartscope --all-features --locked

  finalize:
    name: Commit verified per-library caches
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == '[internal] DS-INDEX-005 per-library cache finalizer retry 3'
    needs: [quality, matrix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write
      issues: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Apply and commit verified per-library caches
        id: commit
        shell: bash
        run: |
          python3 tools/ds_index005_library_cache_apply_v3.py
          rm -f .github/workflows/ds-index005-library-cache-v3-finalize.yml
          rm -f tools/ds_index005_library_cache_apply_v3.py
          rm -f docs/development/ds-index005-library-ubuntu-diagnostic.md
          rm -f docs/development/ds-index005-library-v3-failure.md
          rustup toolchain install 1.95.0 --profile minimal --component rustfmt
          cargo fmt --all
          cargo fmt --all -- --check
          cargo test -p dartscope-index --locked --quiet
          python3 tools/check-repository-consistency.py
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "perf: cache GraphQL bindings by Dart library"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Publish success and close trigger
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.commit.outputs.sha }}',
              state: 'success',
              context: 'dartscope/ci',
              description: 'Rust 1.95 per-library cache v3 gate passed',
            });
            if (context.eventName === 'issues') {
              await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, state: 'closed'});
            }

  record_failure:
    name: Record per-library v3 failure
    needs: [quality, matrix]
    if: always() && (github.event_name == 'workflow_dispatch' || github.event.issue.title == '[internal] DS-INDEX-005 per-library cache finalizer retry 3') && (needs.quality.result != 'success' || needs.matrix.result != 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write
      issues: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Record exact failure
        id: failure
        shell: bash
        run: |
          rm -f .github/workflows/ds-index005-library-cache-v3-finalize.yml
          rm -f tools/ds_index005_library_cache_apply_v3.py
          rm -f docs/development/ds-index005-library-ubuntu-diagnostic.md
          mkdir -p docs/development
          cat > docs/development/ds-index005-library-v3-failure.md <<'EOF'
          ---
          id: doc://docs/development/ds-index005-library-v3-failure.md
          kind: verification_report
          language: en
          source_language: en
          status: active
          ---

          # DS-INDEX-005 Per-Library Cache V3 Failure

          The worktree-only per-library implementation was not committed.

          - quality result: `${{ needs.quality.result }}`
          - quality failed stage: `${{ needs.quality.outputs.failed_stage }}`
          - Linux/Windows matrix: `${{ needs.matrix.result }}`
          EOF
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "ci: record DS-INDEX-005 per-library v3 failure"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Publish failure and close trigger
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: '${{ steps.failure.outputs.sha }}', state: 'failure', context: 'dartscope/ci', description: 'DS-INDEX-005 per-library cache v3 failed'});
            if (context.eventName === 'issues') {
              await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, state: 'closed'});
            }
