name: Direct property target staging

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  verify:
    if: github.head_ref == 'agent/direct-property-targets'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/direct-property-targets
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy
      - name: Apply and format product patch
        run: |
          set -euo pipefail
          python3 .github/scripts/apply_direct_property_targets.py
          cargo +1.95.0 fmt --all
      - name: Commit formatted product files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            crates/dartscope-core/src/lib.rs \
            crates/dartscope-parse/src/lib.rs \
            crates/dartscope-parse/src/analysis.rs \
            crates/dartscope-parse/src/property_references.rs \
            crates/dartscope-parse/tests/property_references.rs \
            crates/dartscope-index/src/references.rs \
            crates/dartscope-index/src/navigation.rs \
            crates/dartscope-index/tests/navigation_properties.rs
          if ! git diff --cached --quiet; then
            git commit -m "feat: resolve direct property targets"
            git push origin HEAD:agent/direct-property-targets
          fi
      - name: Verify and retain output
        id: verify
        shell: bash
        run: |
          status=0
          {
            echo '=== format ==='
            cargo +1.95.0 fmt --all -- --check || status=1
            echo '=== parser property facts ==='
            cargo +1.95.0 test -p dartscope-parse --test property_references --locked || status=1
            echo '=== navigation properties ==='
            cargo +1.95.0 test -p dartscope-index --test navigation_properties --locked || status=1
            echo '=== workspace all-targets ==='
            cargo +1.95.0 check --workspace --all-targets --locked || status=1
            echo '=== umbrella all-features ==='
            cargo +1.95.0 check -p dartscope --all-features --locked || status=1
            echo '=== workspace tests ==='
            cargo +1.95.0 test --workspace --locked --quiet || status=1
            echo '=== workspace clippy ==='
            cargo +1.95.0 clippy --workspace --all-targets --locked -- -D warnings || status=1
            echo "FINAL_STATUS=${status}"
            echo "status=${status}" >> "${GITHUB_OUTPUT}"
          } 2>&1 | tee .github/direct-property-targets.log
      - name: Commit diagnostic output
        if: always()
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/direct-property-targets.log
          if ! git diff --cached --quiet; then
            git commit -m "ci: retain direct property target log"
            git push origin HEAD:agent/direct-property-targets
          fi
      - name: Fail on verification error
        if: steps.verify.outputs.status != '0'
        run: exit 1
