name: Finalize DS-INDEX-005 Cleanup

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ds-index005-final-cleanup
  cancel-in-progress: false

jobs:
  quality:
    name: Cleanup quality gate
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == '[internal] DS-INDEX-005 final cleanup'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Apply cleanup in the worktree
        shell: bash
        run: |
          rm -f .github/workflows/ds-index005-final-cleanup.yml
          rm -f tools/ds_index005_cache_baseline_apply.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('docs/development/dartscope-library-plan.md')
          text = path.read_text(encoding='utf-8')
          old = '''16. Added deterministic retained-cache metrics for index and lint contexts plus an informational 1k/10k
              initial-build and single-library update-time baseline. CI gates cache shapes, one-library counters, and
              full semantic equivalence while intentionally avoiding host-dependent duration thresholds.

          Verification completed (2026-07-18):
          '''
          new = '''16. Added deterministic retained-cache metrics for index and lint contexts plus an informational 1k/10k
              initial-build and single-library update-time baseline. CI gates cache shapes, one-library counters, and
              full semantic equivalence while intentionally avoiding host-dependent duration thresholds.
          17. **P1 fixed:** the corrected apply diagnostic wrote the reviewed baseline patcher into the repository
              as an untracked file, and `git reset --hard` did not remove it. Final cleanup now removes generated
              diagnostic helpers explicitly before staging and verifies the resulting workflow/tool inventory.

          Verification completed (2026-07-18):
          '''
          if text.count(old) != 1:
              raise SystemExit(f'roadmap cleanup anchor count: {text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Install actionlint 1.7.12
        env:
          GOBIN: ${{ runner.temp }}/actionlint-bin
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$GOBIN" >> "$GITHUB_PATH"
      - name: Lint permanent workflows
        run: actionlint -color
      - name: Test workflow policy
        run: python3 -m unittest discover -s tools/tests -p 'test_*.py' -v
      - name: Enforce workflow policy
        run: python3 tools/check-workflow-policy.py
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check repository consistency
        run: python3 tools/check-repository-consistency.py
      - name: Check release packages
        run: python3 tools/check-release-packages.py

  matrix:
    name: Rust 1.95 (${{ matrix.os }})
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == '[internal] DS-INDEX-005 final cleanup'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Apply cleanup in the worktree
        shell: bash
        run: |
          rm -f .github/workflows/ds-index005-final-cleanup.yml
          rm -f tools/ds_index005_cache_baseline_apply.py
          python - <<'PY'
          from pathlib import Path
          path = Path('docs/development/dartscope-library-plan.md')
          text = path.read_text(encoding='utf-8')
          old = '''16. Added deterministic retained-cache metrics for index and lint contexts plus an informational 1k/10k
              initial-build and single-library update-time baseline. CI gates cache shapes, one-library counters, and
              full semantic equivalence while intentionally avoiding host-dependent duration thresholds.

          Verification completed (2026-07-18):
          '''
          new = '''16. Added deterministic retained-cache metrics for index and lint contexts plus an informational 1k/10k
              initial-build and single-library update-time baseline. CI gates cache shapes, one-library counters, and
              full semantic equivalence while intentionally avoiding host-dependent duration thresholds.
          17. **P1 fixed:** the corrected apply diagnostic wrote the reviewed baseline patcher into the repository
              as an untracked file, and `git reset --hard` did not remove it. Final cleanup now removes generated
              diagnostic helpers explicitly before staging and verifies the resulting workflow/tool inventory.

          Verification completed (2026-07-18):
          '''
          if text.count(old) != 1:
              raise SystemExit(f'roadmap cleanup anchor count: {text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Run workspace and feature gates
        shell: bash
        run: |
          cargo test --workspace --locked --quiet
          cargo check --workspace --all-targets --locked
          cargo check -p dartscope --no-default-features --locked
          cargo check -p dartscope --all-features --locked

  finalize:
    name: Commit verified cleanup
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == '[internal] DS-INDEX-005 final cleanup'
    needs: [quality, matrix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
      - name: Apply and commit clean tree
        id: commit
        shell: bash
        run: |
          rm -f .github/workflows/ds-index005-final-cleanup.yml
          rm -f tools/ds_index005_cache_baseline_apply.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('docs/development/dartscope-library-plan.md')
          text = path.read_text(encoding='utf-8')
          old = '''16. Added deterministic retained-cache metrics for index and lint contexts plus an informational 1k/10k
              initial-build and single-library update-time baseline. CI gates cache shapes, one-library counters, and
              full semantic equivalence while intentionally avoiding host-dependent duration thresholds.

          Verification completed (2026-07-18):
          '''
          new = '''16. Added deterministic retained-cache metrics for index and lint contexts plus an informational 1k/10k
              initial-build and single-library update-time baseline. CI gates cache shapes, one-library counters, and
              full semantic equivalence while intentionally avoiding host-dependent duration thresholds.
          17. **P1 fixed:** the corrected apply diagnostic wrote the reviewed baseline patcher into the repository
              as an untracked file, and `git reset --hard` did not remove it. Final cleanup now removes generated
              diagnostic helpers explicitly before staging and verifies the resulting workflow/tool inventory.

          Verification completed (2026-07-18):
          '''
          if text.count(old) != 1:
              raise SystemExit(f'roadmap cleanup anchor count: {text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          python3 tools/check-repository-consistency.py
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "chore: finalize DS-INDEX-005 cleanup"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Publish success and close trigger
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: '${{ steps.commit.outputs.sha }}', state: 'success', context: 'dartscope/ci', description: 'Rust 1.95 DS-INDEX-005 clean matrix passed'});
            if (context.eventName === 'issues') {
              await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, state: 'closed'});
            }
