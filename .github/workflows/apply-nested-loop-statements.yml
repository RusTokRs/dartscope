name: Apply Nested Loop Statements

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Apply product patch
        run: |
          python3 tools/apply-nested-loop-statements.py
          rm tools/apply-nested-loop-statements.py
          rm .github/workflows/apply-nested-loop-statements.yml
      - name: Format and test parser and index
        run: |
          rustup toolchain install 1.95.0 --profile minimal --component rustfmt
          rustfmt +1.95.0 --edition 2024 \
            crates/dartscope-parse/src/lexical_regions/controls.rs \
            crates/dartscope-parse/tests/lexical_region_bindings.rs \
            crates/dartscope-index/tests/lexical_region_resolution.rs
          cargo +1.95.0 test -p dartscope-parse -p dartscope-index --locked
          git diff --check
      - name: Commit verified change
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/dartscope-parse/src/lexical_regions/controls.rs
          git add crates/dartscope-parse/tests/lexical_region_bindings.rs
          git add crates/dartscope-index/tests/lexical_region_resolution.rs
          git add -u .github/workflows/apply-nested-loop-statements.yml
          git add -u tools/apply-nested-loop-statements.py
          git commit -m "Resolve loop bindings in nested statements"
          git push origin "HEAD:${HEAD_BRANCH}"
