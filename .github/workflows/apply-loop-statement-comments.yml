name: Apply Loop Statement Comments

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Apply product patch
        run: |
          python3 tools/apply-loop-statement-comments.py
          rm tools/apply-loop-statement-comments.py
          rm .github/workflows/apply-loop-statement-comments.yml
      - name: Validate parser, index, and Clippy
        run: |
          rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy
          rustfmt +1.95.0 --edition 2024 \
            crates/dartscope-parse/src/lexical_regions/controls.rs \
            crates/dartscope-parse/tests/commented_statement_for.rs \
            crates/dartscope-index/tests/commented_statement_for_resolution.rs
          cargo +1.95.0 test -p dartscope-parse -p dartscope-index --locked
          cargo +1.95.0 clippy --workspace --all-targets --locked -- -D warnings
          git diff --check
      - name: Commit verified change
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/dartscope-parse/src/lexical_regions/controls.rs
          git add crates/dartscope-parse/tests/commented_statement_for.rs
          git add crates/dartscope-index/tests/commented_statement_for_resolution.rs
          git add -u .github/workflows/apply-loop-statement-comments.yml
          git add -u tools/apply-loop-statement-comments.py
          git commit -m "Skip comments between loop statements"
          git push origin "HEAD:${HEAD_BRANCH}"
