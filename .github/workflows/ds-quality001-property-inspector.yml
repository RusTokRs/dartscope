name: Inspect DS-QUALITY-001 Property Coverage

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  inspect:
    if: github.event.issue.title == '[internal] inspect DS-QUALITY-001 property coverage'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
      - name: Verify exact base and inspect
        id: inspect
        shell: bash
        env:
          EXPECTED_BASE: 131e77d2d0828f9728337d24d909f297bc8d0460
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = "$EXPECTED_BASE"
          {
            echo 'FILES'
            find crates/dartscope-index -maxdepth 4 -type f | sort
            echo
            echo 'MATCHES'
            rg -n --glob '*.rs' 'incremental|full rebuild|full_rebuild|equivalence|combinator|show\b|hide\b|DartWorkspaceIndex|resolve.*symbol|NotVisible' crates/dartscope-index || true
          } > "$RUNNER_TEMP/property-inspection.txt"
          python3 - <<'PY'
          import os
          from pathlib import Path
          text = Path(os.environ['RUNNER_TEMP']) / 'property-inspection.txt'
          content = text.read_text(encoding='utf-8')
          if len(content) > 60000:
              content = content[:60000] + '\n... truncated ...\n'
          Path(os.environ['RUNNER_TEMP'], 'property-comment.md').write_text(
              '```text\n' + content.replace('```', '``\\`') + '\n```\n',
              encoding='utf-8',
          )
          PY
      - name: Remove inspector and report
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          COMMENT_PATH: ${{ runner.temp }}/property-comment.md
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { execFileSync } = require('child_process');
            execFileSync('git', ['config', 'user.name', 'dartscope-ci']);
            execFileSync('git', ['config', 'user.email', 'actions@users.noreply.github.com']);
            execFileSync('git', ['rm', '.github/workflows/ds-quality001-property-inspector.yml']);
            execFileSync('git', ['commit', '-m', 'ci: remove DS-QUALITY-001 property inspector']);
            execFileSync('git', ['push', 'origin', 'HEAD:main']);
            const sha = execFileSync('git', ['rev-parse', 'HEAD'], {encoding: 'utf8'}).trim();
            const body = `clean_sha=${sha}\n\n${fs.readFileSync(process.env.COMMENT_PATH, 'utf8')}`;
            await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body});
            await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, state: 'closed'});
