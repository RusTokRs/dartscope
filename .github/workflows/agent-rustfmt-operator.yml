name: Agent rustfmt operator slice

on:
  push:
    branches:
      - agent/direct-unary-index-operators

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust 1.95 with rustfmt
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt
      - name: Apply rustfmt
        run: cargo +1.95.0 fmt --all
      - name: Commit formatting
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "rustfmt already clean"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            crates/dartscope-parse/src/operator_references.rs \
            crates/dartscope-parse/tests/operator_references.rs \
            crates/dartscope-index/tests/navigation_operators.rs
          git commit -m "style: apply rustfmt to operator slice"
          git push
