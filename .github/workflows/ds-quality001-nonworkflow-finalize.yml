name: Finalize Verified DS-QUALITY-001 Non-Workflow Files

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  finalize:
    if: github.event.issue.title == '[internal] finalize verified DS-QUALITY-001 non-workflow files'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
      - name: Reproduce and verify final worktree
        shell: bash
        run: |
          python3 tools/ds_quality001_dependency_gates_apply_v7.py
          rm -f .github/workflows/ds-quality001-dependency-v7-finalize.yml
          rm -f .github/workflows/ds-quality001-dependency-v8-finalize.yml
          rm -f .github/workflows/ds-quality001-export.yml
          rm -f .github/workflows/ds-quality001-nonworkflow-finalize.yml
          rm -f tools/ds_quality001_dependency_gates_apply_v7.py
          rm -f docs/development/ds-quality001-dependency-v6-failure.md
          rm -f docs/development/ds-quality001-dependency-v7-failure.md
          rm -f docs/development/ds-quality001-dependency-v8-failure.md
          rustup toolchain install 1.95.0 --profile minimal --component rustfmt
          cargo +1.95.0 check -p dartscope-parse
          cargo fmt --all
          cargo fmt --all -- --check
          python3 -W error::SyntaxWarning -m unittest discover -s tools/tests -p 'test_dependency_policy.py' -v
          python3 -m unittest discover -s tools/tests -p 'test_*.py' -v
          python3 tools/check-workflow-policy.py
          python3 -W error::SyntaxWarning tools/check-dependency-policy.py --today 2026-07-18
          cargo check -p dartscope-parse --all-targets --locked
          python3 tools/check-repository-consistency.py
      - name: Commit verified non-workflow files
        id: commit
        shell: bash
        run: |
          git restore --source=HEAD --staged --worktree .github/workflows
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "no verified non-workflow changes" >&2
            exit 1
          fi
          git commit -m "ci: add durable dependency quality policy"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Report commit and close trigger
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `sha=${{ steps.commit.outputs.sha }}`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
