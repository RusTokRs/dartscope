name: Export Verified DS-QUALITY-001 Worktree

on:
  issues:
    types: [opened]

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  export:
    if: github.event.issue.title == '[internal] export verified DS-QUALITY-001 worktree'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Reproduce verified final worktree
        shell: bash
        run: |
          python3 tools/ds_quality001_dependency_gates_apply_v7.py
          rm -f .github/workflows/ds-quality001-dependency-v7-finalize.yml
          rm -f .github/workflows/ds-quality001-dependency-v8-finalize.yml
          rm -f .github/workflows/ds-quality001-export.yml
          rm -f tools/ds_quality001_dependency_gates_apply_v7.py
          rm -f docs/development/ds-quality001-dependency-v6-failure.md
          rm -f docs/development/ds-quality001-dependency-v7-failure.md
          rm -f docs/development/ds-quality001-dependency-v8-failure.md
          rustup toolchain install 1.95.0 --profile minimal --component rustfmt
          cargo +1.95.0 check -p dartscope-parse
          cargo fmt --all
          cargo fmt --all -- --check
          python3 -W error::SyntaxWarning -m unittest discover -s tools/tests -p 'test_dependency_policy.py' -v
          python3 tools/check-workflow-policy.py
          python3 -W error::SyntaxWarning tools/check-dependency-policy.py --today 2026-07-18
          cargo check -p dartscope-parse --all-targets --locked
          python3 tools/check-repository-consistency.py
      - name: Build exact diff artifact
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import shutil
          import subprocess

          root = Path.cwd()
          export = root / 'verified-worktree'
          files = export / 'files'
          files.mkdir(parents=True, exist_ok=True)

          changed = subprocess.check_output(
              ['git', 'diff', '--name-only', '--diff-filter=ACMRTUXB', 'HEAD'],
              text=True,
          ).splitlines()
          untracked = subprocess.check_output(
              ['git', 'ls-files', '--others', '--exclude-standard'],
              text=True,
          ).splitlines()
          deleted = subprocess.check_output(
              ['git', 'diff', '--name-only', '--diff-filter=D', 'HEAD'],
              text=True,
          ).splitlines()

          selected = sorted(set(changed + untracked))
          for relative in selected:
              source = root / relative
              target = files / relative
              target.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(source, target)

          (export / 'files.txt').write_text('\n'.join(selected) + '\n', encoding='utf-8')
          (export / 'deletions.txt').write_text('\n'.join(sorted(set(deleted))) + '\n', encoding='utf-8')
          (export / 'base-sha.txt').write_text(
              subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True),
              encoding='utf-8',
          )
          (export / 'diff-stat.txt').write_text(
              subprocess.check_output(['git', 'diff', '--stat', 'HEAD'], text=True),
              encoding='utf-8',
          )
          print((export / 'diff-stat.txt').read_text(encoding='utf-8'))
          PY
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ds-quality001-verified-worktree-${{ github.run_id }}
          path: verified-worktree
          if-no-files-found: error
          include-hidden-files: true
      - name: Report run and close trigger
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `run_id=${context.runId}\nartifact=ds-quality001-verified-worktree-${context.runId}`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
