name: Diagnose DS-QUALITY-001 Cargo Machete

on:
  issues:
    types: [opened]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.issue.title == '[internal] DS-QUALITY-001 machete diagnostic'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
      - name: Capture exact cargo-machete output
        shell: bash
        run: |
          set +e
          git show eb18e5b1b4306297797e635600676fbc26c833ae:tools/ds_quality001_dependency_gates_apply.py > tools/ds_quality001_dependency_gates_apply.py
          git show 950eef29617823fa80e744ba636ff02e31efa47b:tools/ds_quality001_dependency_gates_apply_v4.py > tools/ds_quality001_dependency_gates_apply_v4.py
          python3 tools/ds_quality001_dependency_gates_apply_v4.py > /tmp/apply.log 2>&1
          APPLY=$?
          rustup toolchain install 1.95.0 --profile minimal > /tmp/install.log 2>&1
          RUST=$?
          if [ "$APPLY" -eq 0 ] && [ "$RUST" -eq 0 ]; then
            cargo +1.95.0 install cargo-machete --version 0.9.2 --locked >> /tmp/install.log 2>&1
            INSTALL=$?
          else
            INSTALL=125
          fi
          if [ "$INSTALL" -eq 0 ]; then
            cargo +1.95.0 machete > /tmp/machete.log 2>&1
            MACHETE=$?
          else
            MACHETE=125
            cp /tmp/install.log /tmp/machete.log
          fi
          git reset --hard HEAD
          git clean -fd
          rm -f .github/workflows/ds-quality001-machete-diagnostic.yml
          rm -f docs/development/ds-quality001-dependency-failure.md
          mkdir -p docs/development
          {
            echo '---'
            echo 'id: doc://docs/development/ds-quality001-machete-diagnostic.md'
            echo 'kind: verification_report'
            echo 'language: en'
            echo 'source_language: en'
            echo 'status: active'
            echo '---'
            echo
            echo '# DS-QUALITY-001 Cargo Machete Diagnostic'
            echo
            echo "- apply exit: \`$APPLY\`"
            echo "- Rust install exit: \`$RUST\`"
            echo "- cargo-machete install exit: \`$INSTALL\`"
            echo "- machete exit: \`$MACHETE\`"
            echo
            echo '```text'
            tail -240 /tmp/machete.log
            echo '```'
          } > docs/development/ds-quality001-machete-diagnostic.md
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "ci: capture DS-QUALITY-001 machete diagnostic"
          git push origin HEAD:main
      - name: Close trigger
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, state: 'closed'});
