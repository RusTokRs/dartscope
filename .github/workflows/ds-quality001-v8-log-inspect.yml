name: Inspect DS-QUALITY-001 V8 Finalize Log

on:
  issues:
    types: [opened]

permissions:
  contents: write
  actions: read
  issues: write

jobs:
  inspect:
    if: github.event.issue.title == '[internal] inspect DS-QUALITY-001 v8 finalize log'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
      - name: Remove one-shot log inspector
        shell: bash
        run: |
          rm -f .github/workflows/ds-quality001-v8-log-inspect.yml
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "ci: inspect DS-QUALITY-001 v8 finalize log"
          git push origin HEAD:main
      - name: Report finalize log tail
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const response = await github.request('GET /repos/{owner}/{repo}/actions/jobs/{job_id}/logs', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              job_id: 88110078646,
            });
            let text;
            if (typeof response.data === 'string') {
              text = response.data;
            } else if (response.data instanceof ArrayBuffer) {
              text = Buffer.from(response.data).toString('utf8');
            } else if (ArrayBuffer.isView(response.data)) {
              text = Buffer.from(response.data.buffer).toString('utf8');
            } else {
              text = JSON.stringify(response.data);
            }
            const tail = text.split(/\r?\n/).slice(-180).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `\`\`\`text\n${tail.slice(-60000)}\n\`\`\``,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
