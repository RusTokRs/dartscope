name: Verify DS-INDEX-005 Library Cache Patcher V2

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  verify:
    if: github.event.issue.title == '[internal] DS-INDEX-005 library cache patcher v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Apply patcher and record result
        shell: bash
        run: |
          set +e
          LOG="$RUNNER_TEMP/library-cache-v2.log"
          python3 tools/ds_index005_library_cache_apply_v2.py > "$LOG" 2>&1
          STATUS=$?
          bash tools/reset-verification-worktree.sh origin main
          rm -f .github/workflows/ds-index005-library-v2-apply.yml
          rm -f tools/ds_index005_library_cache_apply_v2.py
          rm -f docs/development/ds-index005-library-apply-diagnostic.md
          mkdir -p docs/development
          {
            echo "---"
            echo "id: doc://docs/development/ds-index005-library-v2-apply.md"
            echo "kind: verification_report"
            echo "language: en"
            echo "source_language: en"
            echo "status: active"
            echo "---"
            echo
            echo "# DS-INDEX-005 Library Cache Patcher V2"
            echo
            echo "Apply exit: \`$STATUS\`."
            echo
            echo '```text'
            cat "$LOG"
            echo '```'
          } > docs/development/ds-index005-library-v2-apply.md
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "ci: verify DS-INDEX-005 library patcher v2"
          git push origin HEAD:main
      - name: Close trigger issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
