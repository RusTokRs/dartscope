name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "README.md"
      - "CHANGELOG.md"
      - "SECURITY.md"
      - "docs/release-process.md"
      - "docs/support-matrix.md"
      - "docs/development/ci-supply-chain.md"
      - "tools/check-release-packages.py"
      - "tools/check-repository-consistency.py"
      - "tools/check-workflow-policy.py"
      - "tools/tests/test_workflow_policy.py"
      - "tools/publish-crates.sh"
      - "tools/release-crates.txt"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      publish:
        description: Publish all crates from the selected version tag
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Test and package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install actionlint 1.7.12
        env:
          GOBIN: ${{ runner.temp }}/actionlint-bin
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$GOBIN" >> "$GITHUB_PATH"
      - name: Lint workflows
        run: actionlint -color
      - name: Test workflow policy
        run: python3 -m unittest discover -s tools/tests -p 'test_*.py' -v
      - name: Enforce workflow policy
        run: python3 tools/check-workflow-policy.py
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy
      - name: Verify formatting
        run: cargo fmt --all --check
      - name: Test workspace
        run: cargo test --workspace --locked --quiet
      - name: Test umbrella all features
        run: cargo test -p dartscope --all-features --locked --quiet
      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked
      - name: Validate repository consistency
        env:
          DARTSCOPE_VERIFY_RELEASE_TAG: 1
        run: python3 tools/check-repository-consistency.py
      - name: Validate release packages
        run: python3 tools/check-release-packages.py
      - name: Validate publishing script
        run: bash -n tools/publish-crates.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dartscope-${{ github.sha }}-crates
          path: target/package/*.crate
          if-no-files-found: error

  publish:
    name: Publish crates.io release
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.publish &&
      startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: crates-io
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Publish in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: bash tools/publish-crates.sh
