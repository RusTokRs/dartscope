name: Inspect DS-QUALITY-001 Fuzz Verification

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  inspect:
    if: github.event.issue.title == '[internal] inspect DS-QUALITY-001 bounded fuzzing'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const response = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ds-quality001-fuzz-verify.yml',
              per_page: 5,
            });
            const run = response.data.workflow_runs[0];
            const body = run
              ? `run_id=${run.id}\nstatus=${run.status}\nconclusion=${run.conclusion}\nhead_sha=${run.head_sha}\nurl=${run.html_url}`
              : 'no runs found';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
