name: Diagnose DS-INDEX-005 Clippy Failure

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  statuses: write

jobs:
  diagnose:
    if: github.event.issue.title == '[internal] DS-INDEX-005 Clippy diagnostic'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Capture exact Clippy output without committing the patch
        id: diagnose
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          LOG="$RUNNER_TEMP/ds-index005-clippy.log"
          git show 7d258bbefc0d8268c8170100469bb7e50691693f:tools/ds_index005_semantic_fix.py > "$RUNNER_TEMP/ds-index005-apply.py"
          python3 "$RUNNER_TEMP/ds-index005-apply.py" > "$RUNNER_TEMP/apply.log" 2>&1
          APPLY_STATUS=$?
          if [ "$APPLY_STATUS" -eq 0 ]; then
            rm -f .github/workflows/ds-index005-clippy-diagnose.yml
            rm -f docs/development/ds-index005-follow-up-plan.md
            rm -f docs/development/ds-index005-scheduled-failure.md
            rm -f docs/development/ds-index005-observable-failure.md
            git show 1f458a598417b13192be7643d3d04c6ba83eaf78:.github/workflows/ci.yml > .github/workflows/ci.yml
            rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy > "$RUNNER_TEMP/rustup.log" 2>&1
            RUSTUP_STATUS=$?
          else
            RUSTUP_STATUS=0
          fi
          if [ "$APPLY_STATUS" -eq 0 ] && [ "$RUSTUP_STATUS" -eq 0 ]; then
            cargo fmt --all > "$RUNNER_TEMP/fmt.log" 2>&1
            FMT_STATUS=$?
          else
            FMT_STATUS=0
          fi
          if [ "$APPLY_STATUS" -eq 0 ] && [ "$RUSTUP_STATUS" -eq 0 ] && [ "$FMT_STATUS" -eq 0 ]; then
            cargo clippy --workspace --all-targets --locked -- -D warnings > "$LOG" 2>&1
            CLIPPY_STATUS=$?
          else
            CLIPPY_STATUS=0
          fi

          cp "$RUNNER_TEMP/apply.log" "$RUNNER_TEMP/diagnostic.log"
          if [ "$APPLY_STATUS" -eq 0 ]; then cat "$RUNNER_TEMP/rustup.log" >> "$RUNNER_TEMP/diagnostic.log"; fi
          if [ "$RUSTUP_STATUS" -eq 0 ] && [ -f "$RUNNER_TEMP/fmt.log" ]; then cat "$RUNNER_TEMP/fmt.log" >> "$RUNNER_TEMP/diagnostic.log"; fi
          if [ -f "$LOG" ]; then cat "$LOG" >> "$RUNNER_TEMP/diagnostic.log"; fi

          bash tools/reset-verification-worktree.sh origin main
          rm -f .github/workflows/ds-index005-clippy-diagnose.yml
          rm -f docs/development/ds-index005-scheduled-failure.md
          rm -f docs/development/ds-index005-observable-failure.md
          mkdir -p docs/development
          {
            echo "---"
            echo "id: doc://docs/development/ds-index005-clippy-diagnostic.md"
            echo "kind: verification_report"
            echo "language: en"
            echo "source_language: en"
            echo "status: active"
            echo "---"
            echo
            echo "# DS-INDEX-005 Clippy Diagnostic"
            echo
            echo "- patch apply exit: \`$APPLY_STATUS\`"
            echo "- Rust install exit: \`$RUSTUP_STATUS\`"
            echo "- formatting exit: \`$FMT_STATUS\`"
            echo "- Clippy exit: \`$CLIPPY_STATUS\`"
            echo
            echo '```text'
            tail -n 220 "$RUNNER_TEMP/diagnostic.log"
            echo '```'
          } > docs/development/ds-index005-clippy-diagnostic.md

          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "ci: capture DS-INDEX-005 Clippy diagnostic"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          if [ "$APPLY_STATUS" -ne 0 ] || [ "$RUSTUP_STATUS" -ne 0 ] || [ "$FMT_STATUS" -ne 0 ] || [ "$CLIPPY_STATUS" -ne 0 ]; then
            echo "state=failure" >> "$GITHUB_OUTPUT"
          else
            echo "state=success" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish diagnostic status and close issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.diagnose.outputs.sha }}',
              state: '${{ steps.diagnose.outputs.state }}',
              context: 'dartscope/ci',
              description: 'DS-INDEX-005 Clippy diagnostic captured',
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
