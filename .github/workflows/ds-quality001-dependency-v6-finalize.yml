name: Finalize DS-QUALITY-001 Dependency Gates V6

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ds-quality001-dependency-v6-finalize
  cancel-in-progress: true

jobs:
  quality:
    name: Rust 1.95 dependency and quality gate
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == '[internal] DS-QUALITY-001 dependency finalizer v6'
    runs-on: ubuntu-latest
    outputs:
      failed_stage: ${{ steps.gate.outputs.failed_stage }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Run observable dependency gate v6
        id: gate
        env:
          GOBIN: ${{ runner.temp }}/actionlint-bin
        shell: bash
        run: |
          set +e
          FAILED_STAGE=""
          run_stage() {
            local name="$1"
            shift
            echo "===== $name ====="
            "$@"
            local status=$?
            if [ "$status" -ne 0 ]; then
              FAILED_STAGE="$name (exit $status)"
              return "$status"
            fi
          }

          run_stage "apply dependency gate v6" python3 tools/ds_quality001_dependency_gates_apply_v6.py || true
          if [ -z "$FAILED_STAGE" ]; then
            rm -f .github/workflows/ds-quality001-dependency-v6-finalize.yml
            rm -f tools/ds_quality001_dependency_gates_apply_v6.py
            rm -f docs/development/ds-quality001-dependency-v6-failure.md
            rm -f docs/development/ds-quality001-v5-compile-diagnostic.md
            run_stage "install actionlint" go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12 || true
          fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "actionlint" "$GOBIN/actionlint" -color || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "workflow policy tests" python3 -m unittest discover -s tools/tests -p 'test_*.py' -v || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "workflow policy" python3 tools/check-workflow-policy.py || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "dependency policy warning-clean tests" python3 -W error::SyntaxWarning -m unittest discover -s tools/tests -p 'test_dependency_policy.py' -v || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "dependency exception policy" python3 -W error::SyntaxWarning tools/check-dependency-policy.py --today 2026-07-18 || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "install Rust 1.95" rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "refresh lock after dependency removal" cargo +1.95.0 check -p dartscope-parse || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "verify refreshed lock" cargo +1.95.0 check -p dartscope-parse --all-targets --locked || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "install cargo-audit" cargo +1.95.0 install cargo-audit --version 0.22.2 --locked || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "install cargo-machete" cargo +1.95.0 install cargo-machete --version 0.9.2 --locked || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "RustSec advisory audit" cargo +1.95.0 audit || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "unused dependency scan" cargo +1.95.0 machete || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "format" cargo fmt --all || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "format check" cargo fmt --all -- --check || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "Clippy" cargo clippy --workspace --all-targets --locked -- -D warnings || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "rustdoc" env RUSTDOCFLAGS=-Dwarnings cargo doc --workspace --no-deps --locked || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "workspace tests" cargo test --workspace --locked --quiet || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "umbrella all-features" cargo test -p dartscope --all-features --locked --quiet || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "repository consistency" python3 tools/check-repository-consistency.py || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "release packages" python3 tools/check-release-packages.py || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "publish script syntax" bash -n tools/publish-crates.sh || true; fi
          echo "failed_stage=$FAILED_STAGE" >> "$GITHUB_OUTPUT"
          if [ -n "$FAILED_STAGE" ]; then exit 1; fi

  matrix:
    name: Rust 1.95 (${{ matrix.os }})
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == '[internal] DS-QUALITY-001 dependency finalizer v6'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Apply dependency gate v6 in the worktree
        shell: bash
        run: |
          python tools/ds_quality001_dependency_gates_apply_v6.py
          rm -f .github/workflows/ds-quality001-dependency-v6-finalize.yml
          rm -f tools/ds_quality001_dependency_gates_apply_v6.py
          rm -f docs/development/ds-quality001-dependency-v6-failure.md
          rm -f docs/development/ds-quality001-v5-compile-diagnostic.md
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt
      - name: Refresh lock after dependency removal
        run: cargo +1.95.0 check -p dartscope-parse
      - name: Run Linux and Windows gates
        shell: bash
        run: |
          cargo fmt --all
          cargo fmt --all -- --check
          cargo test --workspace --locked --quiet
          cargo check --workspace --all-targets --locked
          cargo check -p dartscope --no-default-features --locked
          cargo check -p dartscope --all-features --locked

  finalize:
    name: Commit verified dependency gates
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == '[internal] DS-QUALITY-001 dependency finalizer v6'
    needs: [quality, matrix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write
      issues: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Apply and commit verified dependency gates
        id: commit
        shell: bash
        run: |
          python3 tools/ds_quality001_dependency_gates_apply_v6.py
          rm -f .github/workflows/ds-quality001-dependency-v6-finalize.yml
          rm -f tools/ds_quality001_dependency_gates_apply_v6.py
          rm -f docs/development/ds-quality001-dependency-v6-failure.md
          rm -f docs/development/ds-quality001-v5-compile-diagnostic.md
          rustup toolchain install 1.95.0 --profile minimal --component rustfmt
          cargo +1.95.0 check -p dartscope-parse
          cargo fmt --all
          cargo fmt --all -- --check
          python3 -W error::SyntaxWarning -m unittest discover -s tools/tests -p 'test_dependency_policy.py' -v
          python3 -m unittest discover -s tools/tests -p 'test_*.py' -v
          python3 tools/check-workflow-policy.py
          python3 -W error::SyntaxWarning tools/check-dependency-policy.py --today 2026-07-18
          cargo check -p dartscope-parse --all-targets --locked
          python3 tools/check-repository-consistency.py
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "ci: add durable dependency quality gates"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Publish success and close trigger
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.commit.outputs.sha }}',
              state: 'success',
              context: 'dartscope/ci',
              description: 'Rust 1.95 dependency quality gate passed',
            });
            if (context.eventName === 'issues') {
              await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, state: 'closed'});
            }

  record_failure:
    name: Record dependency gate v6 failure
    needs: [quality, matrix]
    if: always() && (github.event_name == 'workflow_dispatch' || github.event.issue.title == '[internal] DS-QUALITY-001 dependency finalizer v6') && (needs.quality.result != 'success' || needs.matrix.result != 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write
      issues: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Record exact failure
        id: failure
        shell: bash
        run: |
          rm -f .github/workflows/ds-quality001-dependency-v6-finalize.yml
          rm -f tools/ds_quality001_dependency_gates_apply_v6.py
          rm -f docs/development/ds-quality001-v5-compile-diagnostic.md
          mkdir -p docs/development
          cat > docs/development/ds-quality001-dependency-v6-failure.md <<'EOF'
          ---
          id: doc://docs/development/ds-quality001-dependency-v6-failure.md
          kind: verification_report
          language: en
          source_language: en
          status: active
          ---

          # DS-QUALITY-001 Dependency Gate V6 Failure

          The worktree-only dependency-gate implementation was not committed.

          - quality result: `${{ needs.quality.result }}`
          - quality failed stage: `${{ needs.quality.outputs.failed_stage }}`
          - Linux/Windows matrix: `${{ needs.matrix.result }}`
          EOF
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "ci: record DS-QUALITY-001 dependency gate v6 failure"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Publish failure and close trigger
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.failure.outputs.sha }}',
              state: 'failure',
              context: 'dartscope/ci',
              description: 'DS-QUALITY-001 dependency gate v6 failed',
            });
            if (context.eventName === 'issues') {
              await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, state: 'closed'});
            }
