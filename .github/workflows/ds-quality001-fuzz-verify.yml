name: Verify DS-QUALITY-001 Bounded Fuzzing

on:
  issues:
    types: [opened]

permissions:
  contents: read
  actions: write
  issues: write

concurrency:
  group: ds-quality001-fuzz-verify
  cancel-in-progress: false

env:
  FUZZ_NIGHTLY: nightly-2026-07-01
  CARGO_FUZZ_VERSION: 0.13.2

jobs:
  quality:
    name: Rust 1.95 and bounded fuzz corpus
    if: github.event.issue.title == '[internal] verify DS-QUALITY-001 bounded fuzzing'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Apply reviewed payload and remove staging infrastructure
        shell: bash
        run: |
          python3 tools/ds_quality001_fuzz_apply.py
          rm -f .github/workflows/ds-quality001-fuzz-snapshot.yml
          rm -f .github/workflows/ds-quality001-fuzz-verify.yml
          rm -f docs/development/.fuzz-snapshot-trigger
          rm -f tools/ds_quality001_fuzz_apply.py
          rm -f tools/.ds_quality001_fuzz_payload_*
      - name: Install toolchains
        run: |
          rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy
          rustup toolchain install "$FUZZ_NIGHTLY" --profile minimal --component rustfmt
      - name: Generate and format final tree
        shell: bash
        run: |
          cargo +"$FUZZ_NIGHTLY" generate-lockfile --manifest-path fuzz/Cargo.toml
          cargo fmt --all
          cargo +"$FUZZ_NIGHTLY" fmt --manifest-path fuzz/Cargo.toml --all
          cargo fmt --all -- --check
          cargo +"$FUZZ_NIGHTLY" fmt --manifest-path fuzz/Cargo.toml --all -- --check
          git add -A
          git diff --cached --check
      - name: Install actionlint and cargo-fuzz
        env:
          GOBIN: ${{ runner.temp }}/actionlint-bin
        shell: bash
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$GOBIN" >> "$GITHUB_PATH"
          cargo +"$FUZZ_NIGHTLY" install cargo-fuzz --version "$CARGO_FUZZ_VERSION" --locked
      - name: Run repository gates
        shell: bash
        run: |
          actionlint -color
          python3 -W error::SyntaxWarning -m unittest discover -s tools/tests -p 'test_*.py' -v
          python3 tools/check-workflow-policy.py
          python3 -W error::SyntaxWarning tools/check-dependency-policy.py --today 2026-07-18
          cargo test -p dartscope-parse --features fuzzing --locked --quiet
          cargo clippy -p dartscope-parse --all-targets --features fuzzing --locked -- -D warnings
          cargo clippy --workspace --all-targets --locked -- -D warnings
          RUSTDOCFLAGS=-Dwarnings cargo doc --workspace --no-deps --locked
          cargo test --workspace --locked --quiet
          cargo test -p dartscope --all-features --locked --quiet
          cargo +"$FUZZ_NIGHTLY" check --manifest-path fuzz/Cargo.toml --all-targets --locked
          python3 tools/check-repository-consistency.py
          python3 tools/check-release-packages.py
          bash -n tools/publish-crates.sh
      - name: Run bounded fuzz corpus
        shell: bash
        run: |
          for target in lexical_masking directives pubspec_package_config graphql uri_normalization; do
            cargo +"$FUZZ_NIGHTLY" fuzz build "$target"
            cargo +"$FUZZ_NIGHTLY" fuzz run "$target" "fuzz/corpus/$target" -- \
              -runs=256 -max_len=4096 -timeout=5 -rss_limit_mb=2048
          done
      - name: Export verified tree
        shell: bash
        run: |
          tree=$(git write-tree)
          mkdir verified-tree
          git archive "$tree" | tar -xf - -C verified-tree
          git diff --cached --stat
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ds-quality001-fuzz-verified-${{ github.run_id }}
          path: verified-tree
          include-hidden-files: true
          if-no-files-found: error

  matrix:
    name: Rust 1.95 (${{ matrix.os }})
    if: github.event.issue.title == '[internal] verify DS-QUALITY-001 bounded fuzzing'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Apply final tree in the worktree
        shell: bash
        run: |
          python tools/ds_quality001_fuzz_apply.py
          rm -f .github/workflows/ds-quality001-fuzz-snapshot.yml
          rm -f .github/workflows/ds-quality001-fuzz-verify.yml
          rm -f docs/development/.fuzz-snapshot-trigger
          rm -f tools/ds_quality001_fuzz_apply.py
          rm -f tools/.ds_quality001_fuzz_payload_*
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy
      - name: Verify stable workspace and fuzzing bridge
        shell: bash
        run: |
          cargo fmt --all
          cargo fmt --all -- --check
          cargo test --workspace --locked --quiet
          cargo check --workspace --all-targets --locked
          cargo check -p dartscope --no-default-features --locked
          cargo check -p dartscope --all-features --locked
          cargo test -p dartscope-parse --features fuzzing --locked --quiet
          cargo clippy -p dartscope-parse --all-targets --features fuzzing --locked -- -D warnings

  success:
    name: Report verified fuzzing tree
    needs: [quality, matrix]
    if: github.event.issue.title == '[internal] verify DS-QUALITY-001 bounded fuzzing' && needs.quality.result == 'success' && needs.matrix.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `run_id=${context.runId}\nartifact=ds-quality001-fuzz-verified-${context.runId}\nquality=success\nmatrix=success`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });

  failure:
    name: Report fuzzing verification failure
    needs: [quality, matrix]
    if: always() && github.event.issue.title == '[internal] verify DS-QUALITY-001 bounded fuzzing' && (needs.quality.result != 'success' || needs.matrix.result != 'success')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `run_id=${context.runId}\nquality=${{ needs.quality.result }}\nmatrix=${{ needs.matrix.result }}`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
