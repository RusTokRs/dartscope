name: Dispatch Final DS-QUALITY-001 CI

on:
  issues:
    types: [opened]

permissions:
  contents: write
  actions: write
  issues: write

jobs:
  dispatch:
    if: github.event.issue.title == '[internal] dispatch final DS-QUALITY-001 CI'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
      - name: Remove dispatcher and expose clean SHA
        id: clean
        shell: bash
        run: |
          rm -f .github/workflows/ds-quality001-final-ci-dispatch.yml
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "ci: dispatch final DS-QUALITY-001 verification"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Dispatch and report CI run
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const sha = '${{ steps.clean.outputs.sha }}';
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              ref: 'main',
            });
            await new Promise((resolve) => setTimeout(resolve, 7000));
            const response = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              event: 'workflow_dispatch',
              per_page: 10,
            });
            const run = response.data.workflow_runs.find((candidate) => candidate.head_sha === sha);
            const body = run
              ? `sha=${sha}\nrun_id=${run.id}\nstatus=${run.status}\nurl=${run.html_url}`
              : `sha=${sha}\nCI dispatched; run ID not visible yet.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 45,
              state: 'closed',
            });
