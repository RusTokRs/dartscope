name: Dispatch Corrected DS-QUALITY-001 CI

on:
  issues:
    types: [opened]

permissions:
  actions: write
  contents: read
  issues: write

jobs:
  dispatch:
    if: github.event.issue.title == '[internal] dispatch corrected DS-QUALITY-001 fuzz CI'
    runs-on: ubuntu-latest
    steps:
      - name: Allow connector cleanup to reach main
        run: sleep 40
      - name: Dispatch permanent CI and report run
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const branch = await github.rest.repos.getBranch({owner: context.repo.owner, repo: context.repo.repo, branch: 'main'});
            const sha = branch.data.commit.sha;
            await github.rest.actions.createWorkflowDispatch({owner: context.repo.owner, repo: context.repo.repo, workflow_id: 'ci.yml', ref: 'main'});
            await new Promise((resolve) => setTimeout(resolve, 15000));
            const response = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch: 'main',
              event: 'workflow_dispatch',
              per_page: 10,
            });
            const run = response.data.workflow_runs.find((candidate) => candidate.head_sha === sha);
            const body = run
              ? `sha=${sha}\nrun_id=${run.id}\nstatus=${run.status}\nurl=${run.html_url}`
              : `sha=${sha}\ndispatched=true\nrun_id=not-yet-visible`;
            await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body});
            await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, state: 'closed'});
