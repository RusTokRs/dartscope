name: Flutter 004 official themes

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/flutter004-themes.yml

permissions:
  contents: write
  statuses: write

concurrency:
  group: flutter004-official-themes
  cancel-in-progress: false

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply official theme slice
        run: python .github/scripts/apply_flutter004_themes.py

      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy

      - name: Normalize formatting
        run: cargo fmt --all

      - name: Run focused theme tests
        run: cargo test -p dartscope-flutter --test official_themes --locked --quiet

      - name: Run Flutter crate tests
        run: cargo test -p dartscope-flutter --locked --quiet

      - name: Run workspace Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked

      - name: Run workspace tests
        run: cargo test --workspace --locked --quiet

      - name: Test umbrella composition
        run: cargo test -p dartscope --all-features --locked --quiet

      - name: Commit verified theme support
        run: |
          rm .github/scripts/apply_flutter004_themes.py
          rm .github/workflows/flutter004-themes.yml
          git fetch origin main
          test "$(git rev-parse origin/main)" = "$GITHUB_SHA"
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: derive official Flutter theme facts"
          git push origin HEAD:main
          echo "FINAL_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Publish finalization status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            const sha = process.env.FINAL_SHA || context.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              context: 'dartscope/flutter004-themes-finalization',
              description: `Flutter 004 theme finalization: ${{ job.status }}`,
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
