name: Finalize DS-INDEX-005 Semantic Invalidation

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ds-index005-scheduled-finalize
  cancel-in-progress: false

jobs:
  quality:
    name: Rust 1.95 semantic and release gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Apply reviewed correction in the worktree
        shell: bash
        run: |
          if [ ! -f docs/development/ds-index005-follow-up-plan.md ]; then
            echo "DS-INDEX-005 semantic follow-up is already finalized"
            exit 0
          fi
          git show 7d258bbefc0d8268c8170100469bb7e50691693f:tools/ds_index005_semantic_fix.py > "$RUNNER_TEMP/ds-index005-apply.py"
          python3 "$RUNNER_TEMP/ds-index005-apply.py"
          rm -f .github/workflows/ds-index005-scheduled-finalize.yml
          rm -f docs/development/ds-index005-follow-up-plan.md
          git show 1f458a598417b13192be7643d3d04c6ba83eaf78:.github/workflows/ci.yml > .github/workflows/ci.yml
      - name: Install actionlint 1.7.12
        env:
          GOBIN: ${{ runner.temp }}/actionlint-bin
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$GOBIN" >> "$GITHUB_PATH"
      - name: Enforce workflow policy
        run: |
          actionlint -color
          python3 -m unittest discover -s tools/tests -p 'test_*.py' -v
          python3 tools/check-workflow-policy.py
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy
      - name: Format the reviewed correction
        run: |
          cargo fmt --all
          cargo fmt --all -- --check
      - name: Run focused semantic regressions
        run: |
          cargo test -p dartscope-index same_name_not_visible_evidence_rebuilds_without_an_import_edge --locked --quiet
          cargo test -p dartscope-index part_membership_changes_rebuild_sibling_reference_sources --locked --quiet
      - name: Run index and scale gates
        run: |
          cargo test -p dartscope-index --locked --quiet
          cargo run -p dartscope-index --example incremental_workspace_baseline --release --locked
      - name: Run workspace quality gates
        env:
          RUSTDOCFLAGS: -D warnings
        run: |
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo doc --workspace --no-deps --locked
          cargo test --workspace --locked --quiet
          cargo test -p dartscope --all-features --locked --quiet
      - name: Run repository and release gates
        run: |
          python3 tools/check-repository-consistency.py
          python3 tools/check-release-packages.py
          bash -n tools/publish-crates.sh

  matrix:
    name: Rust 1.95 (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: python3
          - os: windows-latest
            python: python
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Apply reviewed correction in the worktree
        shell: bash
        run: |
          if [ ! -f docs/development/ds-index005-follow-up-plan.md ]; then
            echo "DS-INDEX-005 semantic follow-up is already finalized"
            exit 0
          fi
          git show 7d258bbefc0d8268c8170100469bb7e50691693f:tools/ds_index005_semantic_fix.py > "$RUNNER_TEMP/ds-index005-apply.py"
          "${{ matrix.python }}" "$RUNNER_TEMP/ds-index005-apply.py"
          rm -f .github/workflows/ds-index005-scheduled-finalize.yml
          rm -f docs/development/ds-index005-follow-up-plan.md
          git show 1f458a598417b13192be7643d3d04c6ba83eaf78:.github/workflows/ci.yml > .github/workflows/ci.yml
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt
      - name: Run Linux and Windows gates
        shell: bash
        run: |
          cargo fmt --all
          cargo fmt --all -- --check
          cargo test --workspace --locked --quiet
          cargo check --workspace --all-targets --locked
          cargo check -p dartscope --no-default-features --locked
          cargo check -p dartscope --all-features --locked

  finalize:
    name: Commit verified semantic correction
    needs: [quality, matrix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Apply and commit verified correction
        id: commit
        shell: bash
        run: |
          if [ ! -f docs/development/ds-index005-follow-up-plan.md ]; then
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git show 7d258bbefc0d8268c8170100469bb7e50691693f:tools/ds_index005_semantic_fix.py > "$RUNNER_TEMP/ds-index005-apply.py"
          python3 "$RUNNER_TEMP/ds-index005-apply.py"
          rm -f .github/workflows/ds-index005-scheduled-finalize.yml
          rm -f docs/development/ds-index005-follow-up-plan.md
          rm -f docs/development/ds-index005-scheduled-failure.md
          git show 1f458a598417b13192be7643d3d04c6ba83eaf78:.github/workflows/ci.yml > .github/workflows/ci.yml
          rustup toolchain install 1.95.0 --profile minimal --component rustfmt
          cargo fmt --all
          cargo fmt --all -- --check
          cargo test -p dartscope-index --locked --quiet
          python3 tools/check-repository-consistency.py
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: complete incremental reference invalidation"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Publish verified aggregate status
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.commit.outputs.sha }}',
              state: 'success',
              context: 'dartscope/ci',
              description: 'Rust 1.95 Linux/Windows scheduled gate passed',
            });

  record_failure:
    name: Record scheduled verification failure
    needs: [quality, matrix]
    if: always() && (needs.quality.result != 'success' || needs.matrix.result != 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Remove scheduler and record failing job
        id: failure
        shell: bash
        run: |
          rm -f .github/workflows/ds-index005-scheduled-finalize.yml
          mkdir -p docs/development
          cat > docs/development/ds-index005-scheduled-failure.md <<'EOF'
          ---
          id: doc://docs/development/ds-index005-scheduled-failure.md
          kind: verification_report
          language: en
          source_language: en
          status: active
          ---

          # DS-INDEX-005 Scheduled Verification Failure

          The scheduled worktree-only correction was not committed.

          - quality job: `${{ needs.quality.result }}`
          - Linux/Windows matrix: `${{ needs.matrix.result }}`

          Inspect the corresponding Actions run before retrying. Permanent read-only CI and the
          DS-INDEX-005 follow-up plan remain in place.
          EOF
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "ci: record DS-INDEX-005 scheduled gate failure"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Publish failure status
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.failure.outputs.sha }}',
              state: 'failure',
              context: 'dartscope/ci',
              description: 'DS-INDEX-005 scheduled verification failed',
            });
