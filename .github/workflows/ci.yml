name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow_policy:
    name: Workflow policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install actionlint 1.7.12
        env:
          GOBIN: ${{ runner.temp }}/actionlint-bin
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$GOBIN" >> "$GITHUB_PATH"
      - name: Lint workflows
        run: actionlint -color
      - name: Test workflow policy
        run: python3 -m unittest discover -s tools/tests -p 'test_*.py' -v
      - name: Enforce workflow policy
        run: python3 tools/check-workflow-policy.py

  dependency_quality:
    name: Dependency security and hygiene
    needs: workflow_policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Validate dependency exception policy
        run: python3 tools/check-dependency-policy.py
      - name: Install pinned dependency tools
        run: |
          cargo +1.95.0 install cargo-audit --version 0.22.2 --locked
          cargo +1.95.0 install cargo-machete --version 0.9.2 --locked
      - name: Run RustSec advisory audit
        run: cargo +1.95.0 audit
      - name: Detect unused dependencies
        run: cargo +1.95.0 machete

  quality:
    name: Quality gates
    needs: workflow_policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check repository consistency
        run: python3 tools/check-repository-consistency.py
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked

  test:
    name: Tests (${{ matrix.os }})
    needs: workflow_policy
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Run workspace tests
        run: cargo test --workspace --locked --quiet

  edition_2024:
    name: Edition 2024 (${{ matrix.os }} / ${{ matrix.check.name }})
    needs: workflow_policy
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        check:
          - name: workspace-all-targets
            command: cargo check --workspace --all-targets --locked
          - name: umbrella-minimal
            command: cargo check -p dartscope --no-default-features --locked
          - name: umbrella-all-features
            command: cargo check -p dartscope --all-features --locked
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Verify workspace edition settings
        shell: bash
        run: |
          grep -Fx 'resolver = "3"' Cargo.toml
          grep -Fx 'edition = "2024"' Cargo.toml
      - name: Run edition check
        run: ${{ matrix.check.command }}

  report:
    name: Publish aggregate status
    needs: [workflow_policy, dependency_quality, quality, test, edition_2024]
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Publish commit status
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const results = [
              '${{ needs.workflow_policy.result }}',
              '${{ needs.dependency_quality.result }}',
              '${{ needs.quality.result }}',
              '${{ needs.test.result }}',
              '${{ needs.edition_2024.result }}',
            ];
            const attempt = Number('${{ github.run_attempt }}');
            const passed = results.every((result) => result === 'success');
            const retry = attempt > 1 ? ` on retry attempt ${attempt}` : '';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'dartscope/ci',
              description: passed
                ? `Rust 1.95 Linux/Windows matrix passed${retry}`
                : `CI jobs: ${results.join(', ')}; attempt ${attempt}`,
            });
