name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply_rust_1_95_fixes:
    name: Apply Rust 1.95 gate fixes
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      revision: ${{ steps.apply.outputs.revision }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: apply
        name: Apply staged gate patch
        shell: bash
        run: |
          set -euo pipefail
          revision="${GITHUB_SHA}"
          shopt -s nullglob
          parts=(.github/rust195-main.patch.b64.part*)

          if [[ "${GITHUB_EVENT_NAME}" == "push" \
            && "${GITHUB_REF}" == "refs/heads/main" \
            && ${#parts[@]} -gt 0 ]]; then
            cat "${parts[@]}" > /tmp/rust195-main.patch.gz.b64
            echo "1bc7fe3a607ccb2b6dbe0e04230fc4074dd3cd2450288dc96e201f07c3055d38  /tmp/rust195-main.patch.gz.b64" \
              | sha256sum --check --strict
            base64 --decode /tmp/rust195-main.patch.gz.b64 \
              | gzip --decompress > /tmp/rust195-main.patch
            echo "2c02e78d5d4816c6d25bd06409e65bfdced2daeb25e417e1c14e876d5adbb5c4  /tmp/rust195-main.patch" \
              | sha256sum --check --strict

            git apply --index /tmp/rust195-main.patch
            git rm "${parts[@]}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "build: satisfy Rust 1.95 verification gates"
            git push origin HEAD:main
            revision="$(git rev-parse HEAD)"
          fi

          echo "revision=${revision}" >> "${GITHUB_OUTPUT}"

  quality:
    name: Quality gates
    needs: apply_rust_1_95_fixes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.apply_rust_1_95_fixes.outputs.revision }}
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked

  test:
    name: Tests (${{ matrix.os }})
    needs: apply_rust_1_95_fixes
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.apply_rust_1_95_fixes.outputs.revision }}
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Run workspace tests
        run: cargo test --workspace --locked --quiet

  edition_2024:
    name: Edition 2024 (${{ matrix.os }} / ${{ matrix.check.name }})
    needs: apply_rust_1_95_fixes
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        check:
          - name: workspace-all-targets
            command: cargo check --workspace --all-targets --locked
          - name: umbrella-minimal
            command: cargo check -p dartscope --no-default-features --locked
          - name: umbrella-all-features
            command: cargo check -p dartscope --all-features --locked
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.apply_rust_1_95_fixes.outputs.revision }}
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Verify workspace edition settings
        shell: bash
        run: |
          grep -Fx 'resolver = "3"' Cargo.toml
          grep -Fx 'edition = "2024"' Cargo.toml
      - name: Run edition check
        run: ${{ matrix.check.command }}

  report:
    name: Publish aggregate status
    needs: [apply_rust_1_95_fixes, quality, test, edition_2024]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Publish commit status
        uses: actions/github-script@v7
        with:
          script: |
            const results = [
              '${{ needs.apply_rust_1_95_fixes.result }}',
              '${{ needs.quality.result }}',
              '${{ needs.test.result }}',
              '${{ needs.edition_2024.result }}',
            ];
            const passed = results.every((result) => result === 'success');
            const revision = '${{ needs.apply_rust_1_95_fixes.outputs.revision }}' || context.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: revision,
              state: passed ? 'success' : 'failure',
              context: 'dartscope/ci',
              description: passed
                ? 'Rust 1.95 Linux/Windows matrix passed'
                : `CI jobs finished: ${results.join(', ')}`,
            });
