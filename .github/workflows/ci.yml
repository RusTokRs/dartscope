name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ds-cli003-applier-diagnostic
  cancel-in-progress: true

jobs:
  diagnose_cli003:
    name: Diagnose DS-CLI-003 applier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
      - name: Recover, instrument, and report
        shell: bash
        run: |
          set +e
          git show 8158723bda807a7f5801506dd8e37c35fe612551:tools/ds_cli003_apply.py.gz.b64 \
            | base64 --decode | gzip --decompress > tools/ds_cli003_apply.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path("tools/ds_cli003_apply.py")
          source = path.read_text(encoding="utf-8")
          old = '''def replace_once(path: str, old: str, new: str) -> None:
              target = ROOT / path
              text = target.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one replacement, found {count}")
              target.write_text(text.replace(old, new), encoding="utf-8")
          '''
          new = '''REPLACEMENT_NUMBER = 0


          def replace_once(path: str, old: str, new: str) -> None:
              global REPLACEMENT_NUMBER
              REPLACEMENT_NUMBER += 1
              target = ROOT / path
              text = target.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  preview = old.splitlines()[0] if old.splitlines() else repr(old)
                  raise SystemExit(
                      f"replacement #{REPLACEMENT_NUMBER} in {path}: "
                      f"expected one occurrence of {preview!r}, found {count}"
                  )
              target.write_text(text.replace(old, new), encoding="utf-8")
          '''
          if source.count(old) != 1:
              raise SystemExit("unable to instrument recovered applier")
          path.write_text(source.replace(old, new), encoding="utf-8")
          PY
          python3 tools/ds_cli003_apply.py > /tmp/ds-cli003.log 2>&1
          status=$?

          git fetch origin main
          git reset --hard origin/main
          git show 5eaf6b6bdc1e3a44c96a128ce443e2748e56ef7b:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f .github/workflows/ds-cli003-finalize.yml tools/ds_cli003_apply.py
          mkdir -p docs/development
          {
            echo "---"
            echo "id: doc://docs/development/ds-cli003-finalization-failure.md"
            echo "kind: verification_report"
            echo "language: en"
            echo "source_language: en"
            echo "status: active"
            echo "---"
            echo
            echo "# DS-CLI-003 Applier Diagnostic"
            echo
            echo "Applier exit status: \`$status\`."
            echo
            echo '```text'
            cat /tmp/ds-cli003.log
            echo '```'
          } > docs/development/ds-cli003-finalization-failure.md
          git add -A
          git commit -m "ci: diagnose DS-CLI-003 applier anchor"
          git push origin HEAD:main
          exit "$status"
