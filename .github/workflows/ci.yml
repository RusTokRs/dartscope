name: Verify reverse package root overlap

on:
  push:
    branches: [main]

permissions:
  contents: write
  statuses: write

concurrency:
  group: apply-reverse-package-root-overlap
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: apply
        name: Add reverse overlap fixture
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('crates/dartscope-resolve/src/lib.rs')
          text = path.read_text()
          package_marker = '        {"name":"duplicate_b","rootUri":"file:///cache/pkg/","packageUri":"src/"}\n'
          package_replacement = (
              '        {"name":"duplicate_b","rootUri":"file:///cache/pkg/","packageUri":"src/"},\n'
              '        {"name":"outer_reverse","rootUri":"file:///workspace/","packageUri":"tool/generated/"},\n'
              '        {"name":"nested_reverse","rootUri":"file:///workspace/tool/","packageUri":"lib/"}\n'
          )
          assert text.count(package_marker) == 1
          text = text.replace(package_marker, package_replacement, 1)

          assertion_marker = '        assert!(codes.contains(&"package_config_package_uri_root_overlap"));\n'
          assertion_replacement = (
              assertion_marker
              + '        assert_eq!(\n'
              + '            codes\n'
              + '                .iter()\n'
              + '                .filter(|code| **code == "package_config_package_uri_root_overlap")\n'
              + '                .count(),\n'
              + '            2\n'
              + '        );\n'
          )
          assert text.count(assertion_marker) == 1
          text = text.replace(assertion_marker, assertion_replacement, 1)
          path.write_text(text)
          PY
      - id: verify
        name: Verify with Rust 1.95
        if: steps.apply.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy
          cargo fmt --all
          cargo test -p dartscope-resolve --locked --quiet
          cargo clippy -p dartscope-resolve --all-targets --locked -- -D warnings
          cargo fmt --all -- --check
      - id: commit
        name: Commit reverse overlap fixture
        if: steps.verify.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          git add crates/dartscope-resolve/src/lib.rs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "test: cover reverse package root overlap"
      - id: push
        name: Push reverse overlap fixture
        if: steps.commit.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: git push origin HEAD:main
      - name: Publish fixture status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const outcomes = {
              apply: '${{ steps.apply.outcome }}',
              verify: '${{ steps.verify.outcome }}',
              commit: '${{ steps.commit.outcome }}',
              push: '${{ steps.push.outcome }}',
            };
            const passed = Object.values(outcomes).every((value) => value === 'success');
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'dartscope/package-config-reverse-overlap',
              description: Object.entries(outcomes).map(([key, value]) => `${key}=${value}`).join(', '),
            });
