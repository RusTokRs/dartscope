name: Apply Verified Pubspec Documentation

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply documentation patch
        shell: bash
        run: |
          set -euo pipefail
          patch_b64=.github/pubspec-docs.patch.gz.b64
          echo "535008d08714f3b4d0f16d6bfa116096915c9d48de14f9f95b2d3996c1ca9e94  ${patch_b64}" \
            | sha256sum --check --strict
          base64 --decode "${patch_b64}" | gzip --decompress > /tmp/pubspec-docs.patch
          echo "a31ce89eece7a44d940f660b4f68eeb0eef15bfa51c976fc3f7661f804b2f4b0  /tmp/pubspec-docs.patch" \
            | sha256sum --check --strict
          git apply --check /tmp/pubspec-docs.patch
          git apply --index /tmp/pubspec-docs.patch
          git rm "${patch_b64}"
          git show 566edbb0da58799d227a4615713631aefaf25978:.github/workflows/ci.yml > .github/workflows/ci.yml
          git add .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: record verified marked pubspec migration"
          git push origin HEAD:main
