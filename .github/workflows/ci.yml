name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow_policy:
    name: Workflow policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install actionlint 1.7.12
        env:
          GOBIN: ${{ runner.temp }}/actionlint-bin
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$GOBIN" >> "$GITHUB_PATH"
      - name: Lint workflows
        run: actionlint -color
      - name: Test workflow policy
        run: python3 -m unittest discover -s tools/tests -p 'test_*.py' -v
      - name: Enforce workflow policy
        run: python3 tools/check-workflow-policy.py

  dependency_quality:
    name: Dependency security and hygiene
    needs: workflow_policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Validate dependency exception policy
        run: python3 tools/check-dependency-policy.py
      - name: Install pinned dependency tools
        run: |
          cargo +1.95.0 install cargo-audit --version 0.22.2 --locked
          cargo +1.95.0 install cargo-machete --version 0.9.2 --locked
      - name: Run RustSec advisory audit
        run: cargo +1.95.0 audit
      - name: Detect unused dependencies
        run: cargo +1.95.0 machete

  fuzz:
    name: Bounded fuzz corpus
    needs: workflow_policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchains
        run: |
          rustup toolchain install 1.95.0 --profile minimal
          rustup toolchain install nightly-2026-07-01 --profile minimal --component rustfmt
      - name: Check fuzz bridge and formatting
        run: |
          cargo +1.95.0 test -p dartscope-parse --features fuzzing --locked --quiet
          cargo +nightly-2026-07-01 fmt --manifest-path fuzz/Cargo.toml -- --check
      - name: Install cargo-fuzz 0.13.2
        run: cargo +1.95.0 install cargo-fuzz --version 0.13.2 --locked
      - name: Build and run bounded fuzz corpus
        shell: bash
        run: |
          targets=(lexical_masking directives pubspec_package_config graphql uri_normalization)
          for target in "${targets[@]}"; do
            cargo +nightly-2026-07-01 fuzz build "$target"
            cargo +nightly-2026-07-01 fuzz run "$target" -- \
              -runs=256 \
              -max_len=4096 \
              -timeout=5 \
              -rss_limit_mb=2048
          done

  benchmark_report:
    name: Benchmark regression report
    needs: workflow_policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: candidate
          fetch-depth: 0
          persist-credentials: false
      - name: Resolve same-runner baseline
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            baseline="$PR_BASE_SHA"
          elif [ -n "$PUSH_BEFORE_SHA" ] && ! [[ "$PUSH_BEFORE_SHA" =~ ^0+$ ]]; then
            baseline="$PUSH_BEFORE_SHA"
          else
            baseline="$(git -C candidate rev-parse HEAD^)"
          fi
          git -C candidate worktree add ../baseline "$baseline"
          printf 'baseline=%s\n' "$baseline"
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Compare benchmark workloads
        shell: bash
        run: |
          set +e
          python3 candidate/tools/report_benchmark_regressions.py \
            --baseline baseline \
            --candidate candidate \
            --markdown "$RUNNER_TEMP/benchmark-report.md" \
            --json "$RUNNER_TEMP/benchmark-report.json"
          status=$?
          if [ -f "$RUNNER_TEMP/benchmark-report.md" ]; then
            cat "$RUNNER_TEMP/benchmark-report.md" >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$status"
      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-regression-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/benchmark-report.md
            ${{ runner.temp }}/benchmark-report.json
          if-no-files-found: warn
          retention-days: 14

  macos_portability:
    name: macOS 15 arm64 portability
    needs: workflow_policy
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Record portability environment
        shell: bash
        run: |
          {
            echo '## macOS portability environment'
            echo
            echo '```text'
            sw_vers
            uname -a
            rustc +1.95.0 -vV
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Check and test workspace
        run: |
          cargo +1.95.0 check --workspace --all-targets --locked
          cargo +1.95.0 test --workspace --locked --quiet
      - name: Build release package archives
        shell: bash
        run: |
          cargo +1.95.0 package --workspace --locked --allow-dirty --no-verify
          archive_count="$(find target/package -maxdepth 1 -type f -name 'dartscope-*.crate' | wc -l | tr -d ' ')"
          test "$archive_count" = "9"

  quality:
    name: Quality gates
    needs: workflow_policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check repository consistency
        run: python3 tools/check-repository-consistency.py
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked

  test:
    name: Tests (${{ matrix.os }})
    needs: workflow_policy
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Run workspace tests
        run: cargo test --workspace --locked --quiet

  edition_2024:
    name: Edition 2024 (${{ matrix.os }} / ${{ matrix.check.name }})
    needs: workflow_policy
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        check:
          - name: workspace-all-targets
            command: cargo check --workspace --all-targets --locked
          - name: umbrella-minimal
            command: cargo check -p dartscope --no-default-features --locked
          - name: umbrella-all-features
            command: cargo check -p dartscope --all-features --locked
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Verify workspace edition settings
        shell: bash
        run: |
          grep -Fx 'resolver = "3"' Cargo.toml
          grep -Fx 'edition = "2024"' Cargo.toml
      - name: Run edition check
        run: ${{ matrix.check.command }}

  report:
    name: Publish aggregate status
    needs:
      [workflow_policy, dependency_quality, fuzz, benchmark_report, macos_portability, quality, test, edition_2024]
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Publish commit status
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const results = [
              '${{ needs.workflow_policy.result }}',
              '${{ needs.dependency_quality.result }}',
              '${{ needs.fuzz.result }}',
              '${{ needs.benchmark_report.result }}',
              '${{ needs.macos_portability.result }}',
              '${{ needs.quality.result }}',
              '${{ needs.test.result }}',
              '${{ needs.edition_2024.result }}',
            ];
            const attempt = Number('${{ github.run_attempt }}');
            const passed = results.every((result) => result === 'success');
            const retry = attempt > 1 ? ` on retry attempt ${attempt}` : '';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'dartscope/ci',
              description: passed
                ? `Rust 1.95 Linux/Windows/macOS and benchmark gates passed${retry}`
                : `CI jobs: ${results.join(', ')}; attempt ${attempt}`,
            });
