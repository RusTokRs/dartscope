name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.85
        run: rustup toolchain install 1.85.0 --profile minimal --component rustfmt,clippy
      - name: Check formatting
        run: cargo +1.85.0 fmt --all -- --check
      - name: Run Clippy
        run: cargo +1.85.0 clippy --workspace --all-targets --locked -- -D warnings
      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo +1.85.0 doc --workspace --no-deps --locked

  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.85
        run: rustup toolchain install 1.85.0 --profile minimal
      - name: Run workspace tests
        run: cargo +1.85.0 test --workspace --locked --quiet
