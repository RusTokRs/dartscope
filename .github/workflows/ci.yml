name: Apply Flutter Selector Policy

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: apply-flutter-selector-policy
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply verified patch
        shell: bash
        run: |
          set -euo pipefail
          patch=.github/pubspec-selector-policy.patch
          test -f "${patch}"
          echo "893def451d623e38afbe713852ca8326b0181f1c023f7ed01b879939c284d179  ${patch}" \
            | sha256sum --check --strict
          git apply --check "${patch}"
          git apply "${patch}"
          git rm "${patch}"
          git show HEAD^:.github/workflows/ci.yml > .github/workflows/ci.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: version Flutter asset selector policy"
          git push origin HEAD:main
