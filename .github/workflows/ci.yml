name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply_selector_policy:
    name: Apply Flutter selector policy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      revision: ${{ steps.apply.outputs.revision }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: apply
        name: Apply staged selector policy
        shell: bash
        run: |
          set -euo pipefail
          revision="${GITHUB_SHA}"
          patch=.github/pubspec-selector-policy.patch

          if [[ "${GITHUB_EVENT_NAME}" == "push" \
            && "${GITHUB_REF}" == "refs/heads/main" \
            && -f "${patch}" ]]; then
            echo "893def451d623e38afbe713852ca8326b0181f1c023f7ed01b879939c284d179  ${patch}" \
              | sha256sum --check --strict
            git apply --check "${patch}"
            git apply --index "${patch}"
            git rm "${patch}"
            git show HEAD^:.github/workflows/ci.yml > .github/workflows/ci.yml
            git add .github/workflows/ci.yml
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "feat: version Flutter asset selector policy"
            git push origin HEAD:main
            revision="$(git rev-parse HEAD)"
          fi

          echo "revision=${revision}" >> "${GITHUB_OUTPUT}"

  quality:
    name: Quality gates
    needs: apply_selector_policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.apply_selector_policy.outputs.revision }}
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked
      - name: Publish quality status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const revision = '${{ needs.apply_selector_policy.outputs.revision }}';
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: revision,
              state,
              context: 'dartscope/quality',
              description: `Quality gates: ${{ job.status }}`,
            });

  test:
    name: Tests (${{ matrix.os }})
    needs: apply_selector_policy
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.apply_selector_policy.outputs.revision }}
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Run workspace tests
        run: cargo test --workspace --locked --quiet
      - name: Publish test status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const revision = '${{ needs.apply_selector_policy.outputs.revision }}';
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: revision,
              state,
              context: 'dartscope/tests-${{ matrix.os }}',
              description: `Workspace tests (${{ matrix.os }}): ${{ job.status }}`,
            });

  edition_2024:
    name: Edition 2024 (${{ matrix.os }} / ${{ matrix.check.name }})
    needs: apply_selector_policy
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        check:
          - name: workspace-all-targets
            command: cargo check --workspace --all-targets --locked
          - name: umbrella-minimal
            command: cargo check -p dartscope --no-default-features --locked
          - name: umbrella-all-features
            command: cargo check -p dartscope --all-features --locked
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.apply_selector_policy.outputs.revision }}
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Verify workspace edition settings
        shell: bash
        run: |
          grep -Fx 'resolver = "3"' Cargo.toml
          grep -Fx 'edition = "2024"' Cargo.toml
      - name: Run edition check
        run: ${{ matrix.check.command }}
      - name: Publish edition status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const revision = '${{ needs.apply_selector_policy.outputs.revision }}';
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: revision,
              state,
              context: 'dartscope/edition-${{ matrix.os }}-${{ matrix.check.name }}',
              description: `Edition check (${{ matrix.os }} / ${{ matrix.check.name }}): ${{ job.status }}`,
            });

  report:
    name: Publish aggregate status
    needs: [apply_selector_policy, quality, test, edition_2024]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Publish commit status
        uses: actions/github-script@v7
        with:
          script: |
            const results = [
              '${{ needs.apply_selector_policy.result }}',
              '${{ needs.quality.result }}',
              '${{ needs.test.result }}',
              '${{ needs.edition_2024.result }}',
            ];
            const passed = results.every((result) => result === 'success');
            const revision = '${{ needs.apply_selector_policy.outputs.revision }}' || context.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: revision,
              state: passed ? 'success' : 'failure',
              context: 'dartscope/ci',
              description: passed
                ? 'Rust 1.95 Linux/Windows matrix passed'
                : `CI jobs finished: ${results.join(', ')}`,
            });
