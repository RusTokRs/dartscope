name: Apply package config metadata

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: apply-package-config-metadata
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply verified metadata patch
        shell: bash
        run: |
          set -euo pipefail
          patch=.github/package-config-metadata.patch
          echo "bb87827f7a8786fd2710222f84d72c360a952b41e999444db69bc1faa1d89519  ${patch}" \
            | sha256sum --check --strict
          git apply --check "${patch}"
          git apply "${patch}"
          git rm "${patch}"
          git show 89f7854569a7634a7173a02b4fa3d160bc218225:.github/workflows/ci.yml > .github/workflows/ci.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: validate package config metadata"
          git push origin HEAD:main
