name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply_pubspec_cutover:
    name: Apply marked pubspec cutover
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      revision: ${{ steps.apply.outputs.revision }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: apply
        name: Apply staged pubspec cutover
        shell: bash
        run: |
          set -euo pipefail
          revision="${GITHUB_SHA}"
          shopt -s nullglob
          parts=(.github/pubspec-cutover.patch.b64.part*)

          if [[ "${GITHUB_EVENT_NAME}" == "push" \
            && "${GITHUB_REF}" == "refs/heads/main" \
            && ${#parts[@]} -gt 0 ]]; then
            cat "${parts[@]}" > /tmp/pubspec-cutover.patch.gz.b64
            echo "5c11ac948f0c369e8133abb2995f1d732b28cd7a0d8128c52283775d65ed99ad  /tmp/pubspec-cutover.patch.gz.b64" \
              | sha256sum --check --strict
            base64 --decode /tmp/pubspec-cutover.patch.gz.b64 \
              | gzip --decompress > /tmp/pubspec-cutover.patch
            echo "772312a88737b09ab6ed4454c33f2aae953aa9332adb704bc94d57a5a6279b78  /tmp/pubspec-cutover.patch" \
              | sha256sum --check --strict

            git apply --index /tmp/pubspec-cutover.patch
            git rm "${parts[@]}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "feat: switch pubspec parsing to marked backend"
            git push origin HEAD:main
            revision="$(git rev-parse HEAD)"
          fi

          echo "revision=${revision}" >> "${GITHUB_OUTPUT}"

  quality:
    name: Quality gates
    needs: apply_pubspec_cutover
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.apply_pubspec_cutover.outputs.revision }}
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked

  test:
    name: Tests (${{ matrix.os }})
    needs: apply_pubspec_cutover
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.apply_pubspec_cutover.outputs.revision }}
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Run workspace tests
        run: cargo test --workspace --locked --quiet

  edition_2024:
    name: Edition 2024 (${{ matrix.os }} / ${{ matrix.check.name }})
    needs: apply_pubspec_cutover
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        check:
          - name: workspace-all-targets
            command: cargo check --workspace --all-targets --locked
          - name: umbrella-minimal
            command: cargo check -p dartscope --no-default-features --locked
          - name: umbrella-all-features
            command: cargo check -p dartscope --all-features --locked
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.apply_pubspec_cutover.outputs.revision }}
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Verify workspace edition settings
        shell: bash
        run: |
          grep -Fx 'resolver = "3"' Cargo.toml
          grep -Fx 'edition = "2024"' Cargo.toml
      - name: Run edition check
        run: ${{ matrix.check.command }}

  report:
    name: Publish aggregate status
    needs: [apply_pubspec_cutover, quality, test, edition_2024]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Publish commit status
        uses: actions/github-script@v7
        with:
          script: |
            const results = [
              '${{ needs.apply_pubspec_cutover.result }}',
              '${{ needs.quality.result }}',
              '${{ needs.test.result }}',
              '${{ needs.edition_2024.result }}',
            ];
            const passed = results.every((result) => result === 'success');
            const revision = '${{ needs.apply_pubspec_cutover.outputs.revision }}' || context.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: revision,
              state: passed ? 'success' : 'failure',
              context: 'dartscope/ci',
              description: passed
                ? 'Rust 1.95 Linux/Windows matrix passed'
                : `CI jobs finished: ${results.join(', ')}`,
            });
