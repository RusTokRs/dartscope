name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  finalize_index005_semantics:
    name: Finalize DS-INDEX-005 semantic invalidation
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '[ds-index005-finalize]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Apply, verify, and commit correction
        env:
          GOBIN: ${{ runner.temp }}/actionlint-bin
        shell: bash
        run: |
          set +e
          LOG="$RUNNER_TEMP/ds-index005-semantic-finalize.log"
          : > "$LOG"
          FAILED_STAGE=""

          run_stage() {
            local name="$1"
            shift
            echo "===== $name =====" | tee -a "$LOG"
            "$@" > >(tee -a "$LOG") 2> >(tee -a "$LOG" >&2)
            local status=$?
            if [ "$status" -ne 0 ]; then
              FAILED_STAGE="$name (exit $status)"
              return "$status"
            fi
          }

          run_stage "apply reviewed correction" python3 tools/ds_index005_semantic_fix.py || true
          if [ -z "$FAILED_STAGE" ]; then
            git show 1f458a598417b13192be7643d3d04c6ba83eaf78:.github/workflows/ci.yml > .github/workflows/ci.yml
            rm -f tools/ds_index005_semantic_fix.py
            rm -f docs/development/ds-index005-follow-up-plan.md
            rm -f docs/development/ds-index005-semantic-finalize-failure.md
            run_stage "install actionlint" go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12 || true
          fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "actionlint" "$GOBIN/actionlint" -color || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "workflow policy tests" python3 -m unittest discover -s tools/tests -p 'test_*.py' -v || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "workflow policy" python3 tools/check-workflow-policy.py || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "install Rust 1.95" rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "format" cargo fmt --all || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "format check" cargo fmt --all -- --check || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "same-name evidence regression" cargo test -p dartscope-index same_name_not_visible_evidence_rebuilds_without_an_import_edge --locked --quiet || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "part sibling regression" cargo test -p dartscope-index part_membership_changes_rebuild_sibling_reference_sources --locked --quiet || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "index tests" cargo test -p dartscope-index --locked --quiet || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "incremental scale baseline" cargo run -p dartscope-index --example incremental_workspace_baseline --release --locked || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "Clippy" cargo clippy --workspace --all-targets --locked -- -D warnings || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "rustdoc" env RUSTDOCFLAGS=-Dwarnings cargo doc --workspace --no-deps --locked || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "workspace tests" cargo test --workspace --locked --quiet || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "umbrella all-features" cargo test -p dartscope --all-features --locked --quiet || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "repository consistency" python3 tools/check-repository-consistency.py || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "release packages" python3 tools/check-release-packages.py || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "publish script syntax" bash -n tools/publish-crates.sh || true; fi

          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"

          if [ -n "$FAILED_STAGE" ]; then
            bash tools/reset-verification-worktree.sh origin main
            git show 1f458a598417b13192be7643d3d04c6ba83eaf78:.github/workflows/ci.yml > .github/workflows/ci.yml
            rm -f tools/ds_index005_semantic_fix.py
            mkdir -p docs/development
            {
              echo "---"
              echo "id: doc://docs/development/ds-index005-semantic-finalize-failure.md"
              echo "kind: verification_report"
              echo "language: en"
              echo "source_language: en"
              echo "status: active"
              echo "---"
              echo
              echo "# DS-INDEX-005 Semantic Finalization Failure"
              echo
              echo "Failed stage: \`$FAILED_STAGE\`."
              echo
              echo "The semantic correction was not committed. Permanent read-only CI was restored."
              echo
              echo '```text'
              tail -n 450 "$LOG"
              echo '```'
            } > docs/development/ds-index005-semantic-finalize-failure.md
            git add -A
            git diff --cached --check
            git commit -m "ci: record DS-INDEX-005 semantic finalization failure"
            git push origin HEAD:main
            exit 1
          fi

          git add -A
          git diff --cached --check
          git commit -m "fix: complete incremental reference invalidation"
          git push origin HEAD:main

  workflow_policy:
    name: Workflow policy
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[ds-index005-finalize]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install actionlint 1.7.12
        env:
          GOBIN: ${{ runner.temp }}/actionlint-bin
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$GOBIN" >> "$GITHUB_PATH"
      - name: Lint workflows
        run: actionlint -color
      - name: Test workflow policy
        run: python3 -m unittest discover -s tools/tests -p 'test_*.py' -v
      - name: Enforce workflow policy
        run: python3 tools/check-workflow-policy.py

  quality:
    name: Quality gates
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[ds-index005-finalize]')
    needs: workflow_policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check repository consistency
        run: python3 tools/check-repository-consistency.py
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked

  test:
    name: Tests (${{ matrix.os }})
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[ds-index005-finalize]')
    needs: workflow_policy
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Run workspace tests
        run: cargo test --workspace --locked --quiet

  edition_2024:
    name: Edition 2024 (${{ matrix.os }} / ${{ matrix.check.name }})
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[ds-index005-finalize]')
    needs: workflow_policy
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        check:
          - name: workspace-all-targets
            command: cargo check --workspace --all-targets --locked
          - name: umbrella-minimal
            command: cargo check -p dartscope --no-default-features --locked
          - name: umbrella-all-features
            command: cargo check -p dartscope --all-features --locked
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Verify workspace edition settings
        shell: bash
        run: |
          grep -Fx 'resolver = "3"' Cargo.toml
          grep -Fx 'edition = "2024"' Cargo.toml
      - name: Run edition check
        run: ${{ matrix.check.command }}

  report:
    name: Publish aggregate status
    if: always() && github.event_name != 'pull_request' && (github.event_name != 'push' || !contains(github.event.head_commit.message, '[ds-index005-finalize]'))
    needs: [workflow_policy, quality, test, edition_2024]
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Publish commit status
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const results = [
              '${{ needs.workflow_policy.result }}',
              '${{ needs.quality.result }}',
              '${{ needs.test.result }}',
              '${{ needs.edition_2024.result }}',
            ];
            const attempt = Number('${{ github.run_attempt }}');
            const passed = results.every((result) => result === 'success');
            const retry = attempt > 1 ? ` on retry attempt ${attempt}` : '';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'dartscope/ci',
              description: passed
                ? `Rust 1.95 Linux/Windows matrix passed${retry}`
                : `CI jobs: ${results.join(', ')}; attempt ${attempt}`,
            });
