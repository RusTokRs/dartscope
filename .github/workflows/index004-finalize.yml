name: Finalize DS-INDEX-004 namespace slice

on:
  push:
    branches: [main]
    paths:
      - .dartscope-index004-slice.py
      - .github/workflows/index004-finalize.yml

permissions:
  contents: write
  statuses: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out staging commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify staging head
        run: |
          git fetch origin main
          test "$(git rev-parse origin/main)" = "$GITHUB_SHA"

      - name: Publish pending finalization status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          target_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          payload=$(jq -n \
            --arg state pending \
            --arg context dartscope/index004-namespace-finalization \
            --arg description "Rust 1.95 namespace resolution gate running" \
            --arg target_url "$target_url" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}')
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "$payload"

      - name: Apply general namespace resolution slice
        run: |
          set +e
          python .dartscope-index004-slice.py > /tmp/index004-apply.log 2>&1
          code=$?
          set -e
          cat /tmp/index004-apply.log
          if [ "$code" -ne 0 ]; then
            tail -n 8 /tmp/index004-apply.log > .dartscope-index004-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .dartscope-index004-error.txt
            git commit -m "ci: capture DS-INDEX-004 apply failure"
            git push origin HEAD:main
            exit "$code"
          fi

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Normalize formatting
        run: cargo fmt --all

      - name: Run focused index tests
        run: cargo test -p dartscope-index --locked --quiet

      - name: Run workspace Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked

      - name: Run workspace tests
        run: cargo test --workspace --locked --quiet

      - name: Test umbrella composition
        run: cargo test -p dartscope --all-features --locked --quiet

      - name: Commit verified namespace resolution
        run: |
          rm -f .dartscope-index004-slice.py .dartscope-index004-error.txt .github/workflows/index004-finalize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add general Dart namespace resolution"
          git push origin HEAD:main
          echo "FINAL_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Publish finalization status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          target_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          payload=$(jq -n \
            --arg state success \
            --arg context dartscope/index004-namespace-finalization \
            --arg description "Rust 1.95 namespace resolution gate passed" \
            --arg target_url "$target_url" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}')
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${FINAL_SHA}" \
            -d "$payload"
