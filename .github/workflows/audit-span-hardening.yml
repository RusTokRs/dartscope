name: Audit Span Hardening

on:
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Inspect unchecked source slicing
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          patterns = [
              re.compile(r'\[[^\]]*(?:byte_start|byte_end|\.start|\.end)[^\]]*\]'),
              re.compile(r'\b(?:split_at|get_unchecked|from_utf8_unchecked)\b'),
              re.compile(r'\bsource\s*\['),
              re.compile(r'\.get\([^\n]*(?:byte_start|byte_end|\.start|\.end)'),
          ]
          lines = ['# Span hardening audit', '']
          hits = []
          for path in sorted(Path('crates').rglob('*.rs')):
              if any(part in {'target', 'fuzz'} for part in path.parts):
                  continue
              text = path.read_text(encoding='utf-8')
              production = text.split('#[cfg(test)]', 1)[0]
              for number, line in enumerate(production.splitlines(), 1):
                  if any(pattern.search(line) for pattern in patterns):
                      hits.append((path.as_posix(), number, line.strip()))
          lines.extend([f'Count: {len(hits)}', ''])
          for path, number, line in hits:
              lines.append(f'- `{path}:{number}` — `{line}`')
          Path('span-hardening-audit.md').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
      - name: Upload report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: span-hardening-audit
          path: span-hardening-audit.md
          if-no-files-found: error
          retention-days: 1
