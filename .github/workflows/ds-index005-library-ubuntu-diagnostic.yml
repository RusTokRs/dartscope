name: Diagnose DS-INDEX-005 Library Cache On Ubuntu

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  diagnose:
    if: github.event.issue.title == '[internal] DS-INDEX-005 library cache Ubuntu diagnostic'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Run focused test and commit raw output
        shell: bash
        run: |
          set +e
          LOG="$RUNNER_TEMP/library-cache-ubuntu.log"
          git show 23b9f8fe98570b1032757979eba8ba4ca1d34f19:tools/ds_index005_library_cache_apply_v2.py > "$RUNNER_TEMP/apply.py"
          python3 "$RUNNER_TEMP/apply.py" > "$LOG" 2>&1
          APPLY_STATUS=$?
          if [ "$APPLY_STATUS" -eq 0 ]; then
            rm -f .github/workflows/ds-index005-library-ubuntu-diagnostic.yml
            rm -f docs/development/ds-index005-library-v2-failure.md
            rustup toolchain install 1.95.0 --profile minimal --component rustfmt >> "$LOG" 2>&1
            INSTALL_STATUS=$?
          else
            INSTALL_STATUS=0
          fi
          if [ "$APPLY_STATUS" -eq 0 ] && [ "$INSTALL_STATUS" -eq 0 ]; then
            cargo fmt --all >> "$LOG" 2>&1
            cargo test -p dartscope-index per_library_graphql_cache_rebuilds_only_the_affected_use_library --locked -- --nocapture >> "$LOG" 2>&1
            TEST_STATUS=$?
          else
            TEST_STATUS=0
          fi

          bash tools/reset-verification-worktree.sh origin main
          rm -f .github/workflows/ds-index005-library-ubuntu-diagnostic.yml
          rm -f docs/development/ds-index005-library-v2-failure.md
          mkdir -p docs/development
          {
            echo "---"
            echo "id: doc://docs/development/ds-index005-library-ubuntu-diagnostic.md"
            echo "kind: verification_report"
            echo "language: en"
            echo "source_language: en"
            echo "status: active"
            echo "---"
            echo
            echo "# DS-INDEX-005 Library Cache Ubuntu Diagnostic"
            echo
            echo "- apply exit: \`$APPLY_STATUS\`"
            echo "- install exit: \`$INSTALL_STATUS\`"
            echo "- focused test exit: \`$TEST_STATUS\`"
            echo
            echo '```text'
            tail -n 350 "$LOG"
            echo '```'
          } > docs/development/ds-index005-library-ubuntu-diagnostic.md
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "ci: capture DS-INDEX-005 Ubuntu diagnostic"
          git push origin HEAD:main
      - name: Close diagnostic issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
