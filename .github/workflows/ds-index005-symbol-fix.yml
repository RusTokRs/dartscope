name: Finalize DS-INDEX-005 Symbol Invalidation

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ds-index005-symbol-fix.yml"
      - "tools/ds_index005_symbol_fix.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ds-index005-symbol-fix-main
  cancel-in-progress: true

jobs:
  finalize:
    name: Apply and verify symbol invalidation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Run observable finalization
        env:
          GOBIN: ${{ runner.temp }}/actionlint-bin
        shell: bash
        run: |
          set +e
          LOG="$RUNNER_TEMP/ds-index005-symbol-fix.log"
          : > "$LOG"
          FAILED_STAGE=""

          run_stage() {
            local name="$1"
            shift
            echo "===== $name =====" | tee -a "$LOG"
            "$@" > >(tee -a "$LOG") 2> >(tee -a "$LOG" >&2)
            local status=$?
            if [ "$status" -ne 0 ]; then
              FAILED_STAGE="$name (exit $status)"
              return "$status"
            fi
          }

          run_stage "apply correction" python3 tools/ds_index005_symbol_fix.py || true
          if [ -z "$FAILED_STAGE" ]; then
            rm -f .github/workflows/ds-index005-symbol-fix.yml tools/ds_index005_symbol_fix.py
            rm -f docs/development/ds-index005-symbol-fix-failure.md
            run_stage "install actionlint" go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12 || true
          fi
          if [ -z "$FAILED_STAGE" ]; then
            run_stage "actionlint" "$GOBIN/actionlint" -color || true
          fi
          if [ -z "$FAILED_STAGE" ]; then
            run_stage "workflow policy tests" python3 -m unittest discover -s tools/tests -p 'test_*.py' -v || true
          fi
          if [ -z "$FAILED_STAGE" ]; then
            run_stage "workflow policy" python3 tools/check-workflow-policy.py || true
          fi
          if [ -z "$FAILED_STAGE" ]; then
            run_stage "install Rust 1.95" rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy || true
          fi
          if [ -z "$FAILED_STAGE" ]; then
            run_stage "rustfmt" cargo fmt --all || true
          fi
          if [ -z "$FAILED_STAGE" ]; then
            run_stage "focused symbol regression" cargo test -p dartscope-index same_name_not_visible_evidence_rebuilds_without_an_import_edge --locked --quiet || true
          fi
          if [ -z "$FAILED_STAGE" ]; then
            run_stage "index tests" cargo test -p dartscope-index --locked --quiet || true
          fi
          if [ -z "$FAILED_STAGE" ]; then
            run_stage "incremental scale baseline" cargo run -p dartscope-index --example incremental_workspace_baseline --release --locked || true
          fi
          if [ -z "$FAILED_STAGE" ]; then
            run_stage "Clippy" cargo clippy --workspace --all-targets --locked -- -D warnings || true
          fi
          if [ -z "$FAILED_STAGE" ]; then
            run_stage "rustdoc" env RUSTDOCFLAGS=-Dwarnings cargo doc --workspace --no-deps --locked || true
          fi
          if [ -z "$FAILED_STAGE" ]; then
            run_stage "workspace tests" cargo test --workspace --locked --quiet || true
          fi
          if [ -z "$FAILED_STAGE" ]; then
            run_stage "umbrella all-features" cargo test -p dartscope --all-features --locked --quiet || true
          fi
          if [ -z "$FAILED_STAGE" ]; then
            run_stage "repository consistency" python3 tools/check-repository-consistency.py || true
          fi
          if [ -z "$FAILED_STAGE" ]; then
            run_stage "release packages" python3 tools/check-release-packages.py || true
          fi
          if [ -z "$FAILED_STAGE" ]; then
            run_stage "publish script syntax" bash -n tools/publish-crates.sh || true
          fi

          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"

          if [ -n "$FAILED_STAGE" ]; then
            bash tools/reset-verification-worktree.sh origin main
            rm -f .github/workflows/ds-index005-symbol-fix.yml tools/ds_index005_symbol_fix.py
            mkdir -p docs/development
            {
              echo "---"
              echo "id: doc://docs/development/ds-index005-symbol-fix-failure.md"
              echo "kind: verification_report"
              echo "language: en"
              echo "source_language: en"
              echo "status: active"
              echo "---"
              echo
              echo "# DS-INDEX-005 Symbol Invalidation Failure"
              echo
              echo "Failed stage: \`$FAILED_STAGE\`."
              echo
              echo "The correction was not committed. Temporary staging files were removed."
              echo
              echo '```text'
              tail -n 350 "$LOG"
              echo '```'
            } > docs/development/ds-index005-symbol-fix-failure.md
            git add -A
            git diff --cached --check
            git commit -m "ci: record DS-INDEX-005 symbol invalidation failure"
            git push origin HEAD:main
            exit 1
          fi

          git add -A
          git diff --cached --check
          git commit -m "fix: invalidate same-name reference evidence"
          git push origin HEAD:main

# trigger revision 2
