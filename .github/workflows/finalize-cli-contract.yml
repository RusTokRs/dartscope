name: Finalize CLI contract

on:
  push:
    branches: [main]
    paths: [.github/workflows/finalize-cli-contract.yml]

permissions:
  contents: write
  statuses: write

concurrency:
  group: finalize-cli-contract
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply verified roadmap state
        run: python .github/scripts/finalize_cli.py
      - name: Commit verified roadmap state
        shell: bash
        run: |
          git rm .github/workflows/finalize-cli-contract.yml .github/scripts/finalize_cli.py
          git add README.md docs/development/dartscope-library-plan.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: verify CLI contract and integration tests"
          git push origin HEAD:main
      - name: Publish finalization status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'dartscope/cli-contract-finalization',
              description: `CLI contract finalization: ${{ job.status }}`,
            });
