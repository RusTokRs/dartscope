name: Verify Symlink Fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt
      - name: Apply symlink policy patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/prepare-symlink-fix.yml').read_text()
          script = workflow.split("python3 - <<'PY'\n", 1)[1].split('\n          PY', 1)[0]
          exec(compile(textwrap.dedent(script), 'prepare-symlink-fix', 'exec'))
          PY
          python3 tools/apply-symlink-fix-post.py
      - name: Format and test CLI
        run: |
          rustfmt +1.95.0 --edition 2024 \
            crates/dartscope-cli/src/main.rs \
            crates/dartscope-cli/tests/cli_contract.rs
          cargo +1.95.0 test -p dartscope-cli --locked
          git diff --check
      - name: Commit verified files and cleanup
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/dartscope-cli/src/main.rs crates/dartscope-cli/tests/cli_contract.rs
          git rm .github/workflows/prepare-symlink-fix.yml .github/workflows/verify-symlink-fix.yml tools/apply-symlink-fix-post.py
          git commit -m "Harden CLI symlink input handling"
          git push origin "HEAD:${HEAD_BRANCH}"
