name: Finalize Corrected DS-INDEX-005

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ds-index005-finalize-fixed
  cancel-in-progress: false

jobs:
  quality:
    name: Rust 1.95 quality and release gate
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == '[internal] DS-INDEX-005 semantic finalizer retry 2'
    runs-on: ubuntu-latest
    outputs:
      failed_stage: ${{ steps.gate.outputs.failed_stage }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Run observable corrected gate
        id: gate
        env:
          GOBIN: ${{ runner.temp }}/actionlint-bin
        shell: bash
        run: |
          set +e
          FAILED_STAGE=""
          run_stage() {
            local name="$1"
            shift
            echo "===== $name ====="
            "$@"
            local status=$?
            if [ "$status" -ne 0 ]; then
              FAILED_STAGE="$name (exit $status)"
              return "$status"
            fi
          }

          run_stage "apply corrected semantics" bash -c '
            git show 7d258bbefc0d8268c8170100469bb7e50691693f:tools/ds_index005_semantic_fix.py > "$RUNNER_TEMP/ds-index005-apply.py" &&
            python3 "$RUNNER_TEMP/ds-index005-apply.py" &&
            python3 - <<"PY"
          from pathlib import Path
          path = Path("crates/dartscope-index/src/incremental.rs")
          text = path.read_text(encoding="utf-8")
          old = """    references_by_path
              .iter()
              .filter_map(|(path, references)| {
                  references
                      .iter()
                      .any(|reference| names.contains(&reference.name))
                      .then(|| path.clone())
              })
              .collect()
          """
          new = """    references_by_path
              .iter()
              .filter(|(_, references)| {
                  references
                      .iter()
                      .any(|reference| names.contains(&reference.name))
              })
              .map(|(path, _)| path.clone())
              .collect()
          """
          if text.count(old) != 1:
              raise SystemExit("expected one filter_map_bool_then anchor")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
            rm -f .github/workflows/ds-index005-finalize-fixed.yml &&
            rm -f docs/development/ds-index005-follow-up-plan.md &&
            rm -f docs/development/ds-index005-scheduled-failure.md &&
            rm -f docs/development/ds-index005-observable-failure.md &&
            rm -f docs/development/ds-index005-clippy-diagnostic.md &&
            git show 1f458a598417b13192be7643d3d04c6ba83eaf78:.github/workflows/ci.yml > .github/workflows/ci.yml
          ' || true
          if [ -z "$FAILED_STAGE" ]; then run_stage "install actionlint" go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12 || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "actionlint" "$GOBIN/actionlint" -color || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "workflow policy tests" python3 -m unittest discover -s tools/tests -p 'test_*.py' -v || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "workflow policy" python3 tools/check-workflow-policy.py || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "install Rust 1.95" rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "format" cargo fmt --all || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "format check" cargo fmt --all -- --check || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "same-name evidence regression" cargo test -p dartscope-index same_name_not_visible_evidence_rebuilds_without_an_import_edge --locked --quiet || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "part sibling regression" cargo test -p dartscope-index part_membership_changes_rebuild_sibling_reference_sources --locked --quiet || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "index tests" cargo test -p dartscope-index --locked --quiet || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "incremental scale baseline" cargo run -p dartscope-index --example incremental_workspace_baseline --release --locked || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "Clippy" cargo clippy --workspace --all-targets --locked -- -D warnings || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "rustdoc" env RUSTDOCFLAGS=-Dwarnings cargo doc --workspace --no-deps --locked || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "workspace tests" cargo test --workspace --locked --quiet || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "umbrella all-features" cargo test -p dartscope --all-features --locked --quiet || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "repository consistency" python3 tools/check-repository-consistency.py || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "release packages" python3 tools/check-release-packages.py || true; fi
          if [ -z "$FAILED_STAGE" ]; then run_stage "publish script syntax" bash -n tools/publish-crates.sh || true; fi

          echo "failed_stage=$FAILED_STAGE" >> "$GITHUB_OUTPUT"
          if [ -n "$FAILED_STAGE" ]; then exit 1; fi

  matrix:
    name: Rust 1.95 (${{ matrix.os }})
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == '[internal] DS-INDEX-005 semantic finalizer retry 2'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: python3
          - os: windows-latest
            python: python
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Apply corrected semantics in the worktree
        shell: bash
        run: |
          git show 7d258bbefc0d8268c8170100469bb7e50691693f:tools/ds_index005_semantic_fix.py > "$RUNNER_TEMP/ds-index005-apply.py"
          "${{ matrix.python }}" "$RUNNER_TEMP/ds-index005-apply.py"
          "${{ matrix.python }}" - <<'PY'
          from pathlib import Path
          path = Path("crates/dartscope-index/src/incremental.rs")
          text = path.read_text(encoding="utf-8")
          old = """    references_by_path
              .iter()
              .filter_map(|(path, references)| {
                  references
                      .iter()
                      .any(|reference| names.contains(&reference.name))
                      .then(|| path.clone())
              })
              .collect()
          """
          new = """    references_by_path
              .iter()
              .filter(|(_, references)| {
                  references
                      .iter()
                      .any(|reference| names.contains(&reference.name))
              })
              .map(|(path, _)| path.clone())
              .collect()
          """
          if text.count(old) != 1:
              raise SystemExit("expected one filter_map_bool_then anchor")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          rm -f .github/workflows/ds-index005-finalize-fixed.yml
          rm -f docs/development/ds-index005-follow-up-plan.md
          rm -f docs/development/ds-index005-scheduled-failure.md
          rm -f docs/development/ds-index005-observable-failure.md
          rm -f docs/development/ds-index005-clippy-diagnostic.md
          git show 1f458a598417b13192be7643d3d04c6ba83eaf78:.github/workflows/ci.yml > .github/workflows/ci.yml
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt
      - name: Run Linux and Windows gates
        shell: bash
        run: |
          cargo fmt --all
          cargo fmt --all -- --check
          cargo test --workspace --locked --quiet
          cargo check --workspace --all-targets --locked
          cargo check -p dartscope --no-default-features --locked
          cargo check -p dartscope --all-features --locked

  finalize:
    name: Commit verified corrected semantics
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == '[internal] DS-INDEX-005 semantic finalizer retry 2'
    needs: [quality, matrix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write
      issues: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Apply and commit verified correction
        id: commit
        shell: bash
        run: |
          git show 7d258bbefc0d8268c8170100469bb7e50691693f:tools/ds_index005_semantic_fix.py > "$RUNNER_TEMP/ds-index005-apply.py"
          python3 "$RUNNER_TEMP/ds-index005-apply.py"
          python3 - <<'PY'
          from pathlib import Path
          path = Path("crates/dartscope-index/src/incremental.rs")
          text = path.read_text(encoding="utf-8")
          old = """    references_by_path
              .iter()
              .filter_map(|(path, references)| {
                  references
                      .iter()
                      .any(|reference| names.contains(&reference.name))
                      .then(|| path.clone())
              })
              .collect()
          """
          new = """    references_by_path
              .iter()
              .filter(|(_, references)| {
                  references
                      .iter()
                      .any(|reference| names.contains(&reference.name))
              })
              .map(|(path, _)| path.clone())
              .collect()
          """
          if text.count(old) != 1:
              raise SystemExit("expected one filter_map_bool_then anchor")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          rm -f .github/workflows/ds-index005-finalize-fixed.yml
          rm -f docs/development/ds-index005-follow-up-plan.md
          rm -f docs/development/ds-index005-scheduled-failure.md
          rm -f docs/development/ds-index005-observable-failure.md
          rm -f docs/development/ds-index005-clippy-diagnostic.md
          rm -f docs/development/ds-index005-final-failure.md
          git show 1f458a598417b13192be7643d3d04c6ba83eaf78:.github/workflows/ci.yml > .github/workflows/ci.yml
          rustup toolchain install 1.95.0 --profile minimal --component rustfmt
          cargo fmt --all
          cargo fmt --all -- --check
          cargo test -p dartscope-index --locked --quiet
          python3 tools/check-repository-consistency.py
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: complete incremental reference invalidation"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Publish success and close trigger
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.commit.outputs.sha }}',
              state: 'success',
              context: 'dartscope/ci',
              description: 'Rust 1.95 Linux/Windows corrected gate passed',
            });
            if (context.eventName === 'issues') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed',
              });
            }

  record_failure:
    name: Record corrected gate failure
    needs: [quality, matrix]
    if: always() && (github.event_name == 'workflow_dispatch' || github.event.issue.title == '[internal] DS-INDEX-005 semantic finalizer retry 2') && (needs.quality.result != 'success' || needs.matrix.result != 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write
      issues: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Record exact corrected-gate failure
        id: failure
        shell: bash
        run: |
          rm -f .github/workflows/ds-index005-finalize-fixed.yml
          rm -f docs/development/ds-index005-scheduled-failure.md
          rm -f docs/development/ds-index005-observable-failure.md
          mkdir -p docs/development
          cat > docs/development/ds-index005-final-failure.md <<'EOF'
          ---
          id: doc://docs/development/ds-index005-final-failure.md
          kind: verification_report
          language: en
          source_language: en
          status: active
          ---

          # DS-INDEX-005 Corrected Gate Failure

          The corrected worktree-only semantic implementation was not committed.

          - quality result: `${{ needs.quality.result }}`
          - quality failed stage: `${{ needs.quality.outputs.failed_stage }}`
          - Linux/Windows matrix: `${{ needs.matrix.result }}`

          Permanent read-only CI and the DS-INDEX-005 follow-up plan remain in place.
          EOF
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "ci: record corrected DS-INDEX-005 failure"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Publish failure and close trigger
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.failure.outputs.sha }}',
              state: 'failure',
              context: 'dartscope/ci',
              description: 'DS-INDEX-005 corrected verification failed',
            });
            if (context.eventName === 'issues') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed',
              });
            }
