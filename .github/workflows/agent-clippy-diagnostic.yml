name: Agent Clippy diagnostic

on:
  pull_request:

permissions:
  contents: write

jobs:
  clippy:
    if: ${{ !contains(github.event.pull_request.head.sha, '0000000') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Install Rust 1.95 with Clippy
        run: rustup toolchain install 1.95.0 --profile minimal --component clippy
      - name: Capture Clippy output
        shell: bash
        run: |
          set +e
          cargo +1.95.0 clippy --workspace --all-targets --all-features --locked -- -D warnings > /tmp/clippy-output.txt 2>&1
          status=$?
          set -e
          mkdir -p .agent
          {
            printf 'status=%s\n' "$status"
            cat /tmp/clippy-output.txt
          } > .agent/clippy-output.txt
      - name: Commit diagnostic output
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .agent/clippy-output.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: capture clippy diagnostic"
          git push
