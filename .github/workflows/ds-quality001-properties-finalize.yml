name: Finalize DS-QUALITY-001 Deterministic Properties

on:
  issues:
    types: [opened]

permissions:
  actions: write
  contents: write
  issues: write

jobs:
  finalize:
    if: github.event.issue.title == '[internal] finalize DS-QUALITY-001 deterministic properties'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
      - name: Verify exact base
        env:
          EXPECTED_BASE: e5d54e8d24458f8ffd2d9b63afa69e0ee50a702e
        shell: bash
        run: test "$(git rev-parse HEAD^)" = "$EXPECTED_BASE"
      - name: Install Rust 1.95 with formatting and lint components
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt --component clippy
      - name: Record deterministic property progress
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('docs/development/dartscope-library-plan.md')
          text = path.read_text(encoding='utf-8')
          anchor = '''7. Added reviewed valid/malformed seed corpora plus a pinned nightly Linux CI job that builds every
             target and runs a fixed 256-execution, 4096-byte bounded campaign.
          '''
          replacement = anchor + '''8. Added a dependency-free deterministic Rust 1.95 property suite for idempotent path
             normalization, repeatable finding order, exact LF/CRLF UTF-8 spans, package URI canonicalization,
             and traversal rejection; the integration test runs in the existing Linux/Windows workspace matrix.
          '''
          if text.count(anchor) != 1:
              raise SystemExit('roadmap progress anchor did not match exactly once')
          path.write_text(text.replace(anchor, replacement), encoding='utf-8')
          PY
      - name: Format deterministic property suite
        run: cargo +1.95.0 fmt --all
      - name: Run focused property tests
        run: cargo +1.95.0 test -p dartscope-parse --test deterministic_properties --locked --quiet
      - name: Lint focused property tests
        id: clippy
        shell: bash
        run: |
          set -o pipefail
          cargo +1.95.0 clippy -p dartscope-parse --test deterministic_properties --locked -- -D warnings 2>&1 | tee /tmp/dartscope-properties-clippy.log
      - name: Verify formatting and intended diff
        shell: bash
        run: |
          cargo +1.95.0 fmt --all -- --check
          mapfile -t changed < <(git diff --name-only | sort)
          printf '%s\n' "${changed[@]}"
          expected=(
            crates/dartscope-parse/tests/deterministic_properties.rs
            docs/development/dartscope-library-plan.md
          )
          test "${changed[*]}" = "${expected[*]}"
      - name: Publish clean feature commit
        id: publish
        shell: bash
        run: |
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git rm .github/workflows/ds-quality001-properties-finalize.yml
          git add crates/dartscope-parse/tests/deterministic_properties.rs
          git add docs/development/dartscope-library-plan.md
          git commit -m "test: verify deterministic span path and URI properties"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Dispatch permanent CI and report run
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const sha = '${{ steps.publish.outputs.sha }}';
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              ref: 'main',
            });
            await new Promise((resolve) => setTimeout(resolve, 15000));
            const response = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch: 'main',
              event: 'workflow_dispatch',
              per_page: 10,
            });
            const run = response.data.workflow_runs.find((candidate) => candidate.head_sha === sha);
            const body = run
              ? `sha=${sha}\nrun_id=${run.id}\nstatus=${run.status}\nurl=${run.html_url}`
              : `sha=${sha}\ndispatched=true\nrun_id=not-yet-visible`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
      - name: Report focused failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            let details = '';
            const path = '/tmp/dartscope-properties-clippy.log';
            if (fs.existsSync(path)) {
              const log = fs.readFileSync(path, 'utf8');
              details = `\n\n\`\`\`text\n${log.slice(-6000)}\n\`\`\``;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `focused_finalize=failure\nrun_id=${context.runId}\nhead=${context.sha}${details}`,
            });
