name: Member navigation audit staging

on:
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    if: github.head_ref == 'agent/audit-member-navigation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: true
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy
      - name: Apply audited member fixes and operator slice
        run: python3 tools/agent/apply-member-audit-operators.py
      - name: Format product files
        run: cargo +1.95.0 fmt --all
      - name: Commit formatted product files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            crates/dartscope-core/src/lib.rs \
            crates/dartscope-parse/src/lib.rs \
            crates/dartscope-parse/src/analysis.rs \
            crates/dartscope-parse/src/member_reference_syntax.rs \
            crates/dartscope-parse/src/member_references.rs \
            crates/dartscope-parse/src/property_references.rs \
            crates/dartscope-parse/src/operator_references.rs \
            crates/dartscope-parse/tests/member_reference_regressions.rs \
            crates/dartscope-parse/tests/operator_references.rs \
            crates/dartscope-index/src/namespace.rs \
            crates/dartscope-index/src/navigation.rs \
            crates/dartscope-index/src/navigation/members.rs \
            crates/dartscope-index/src/references.rs \
            crates/dartscope-index/tests/navigation_member_regressions.rs \
            crates/dartscope-index/tests/navigation_operators.rs
          if ! git diff --cached --quiet; then
            git commit -m "feat: harden direct member and operator targets"
            git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          fi
      - name: Verify Rust 1.95 contracts
        shell: bash
        env:
          RUSTDOCFLAGS: -D warnings
        run: |
          set -euo pipefail
          cargo +1.95.0 fmt --all -- --check
          cargo +1.95.0 test -p dartscope-parse --test member_reference_regressions --locked
          cargo +1.95.0 test -p dartscope-parse --test operator_references --locked
          cargo +1.95.0 test -p dartscope-index --test navigation_member_regressions --locked
          cargo +1.95.0 test -p dartscope-index --test navigation_operators --locked
          cargo +1.95.0 check --workspace --all-targets --locked
          cargo +1.95.0 check -p dartscope --all-features --locked
          cargo +1.95.0 test --workspace --locked --quiet
          cargo +1.95.0 clippy --workspace --all-targets --locked -- -D warnings
          cargo +1.95.0 doc --workspace --no-deps --locked
