name: Adjust Deep Tree Stress Depth

on:
  pull_request:

permissions:
  contents: write

jobs:
  adjust:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Adjust portable stress depth
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/dartscope-cli/src/main.rs')
          source = path.read_text(encoding='utf-8')
          old = 'for _ in 0..512 {'
          if source.count(old) != 1:
              raise SystemExit('expected one 512-level stress loop')
          path.write_text(source.replace(old, 'for _ in 0..256 {', 1), encoding='utf-8')
          PY
          rm .github/workflows/adjust-deep-tree-depth.yml
      - name: Format and test CLI
        run: |
          rustup toolchain install 1.95.0 --profile minimal --component rustfmt
          rustfmt +1.95.0 --edition 2024 crates/dartscope-cli/src/main.rs
          cargo +1.95.0 test -p dartscope-cli --locked
          git diff --check
      - name: Commit verified adjustment
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/dartscope-cli/src/main.rs
          git add -u .github/workflows/adjust-deep-tree-depth.yml
          git commit -m "Keep deep tree regression within portable path limits"
          git push origin "HEAD:${HEAD_BRANCH}"
