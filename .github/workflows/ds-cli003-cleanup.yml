name: Finalize DS-CLI-003 Cleanup

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ds-cli003-cleanup.yml"
      - "tools/ds_cli003_cleanup.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ds-cli003-cleanup-main
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Record cleanup and remove staging files
        run: |
          python3 tools/ds_cli003_cleanup.py
          rm .github/workflows/ds-cli003-cleanup.yml tools/ds_cli003_cleanup.py
      - name: Validate permanent repository
        env:
          GOBIN: ${{ runner.temp }}/actionlint-bin
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          "$GOBIN/actionlint" -color
          python3 -m unittest discover -s tools/tests -p 'test_*.py' -v
          python3 tools/check-workflow-policy.py
          python3 tools/check-repository-consistency.py
          cargo fmt --all -- --check
          cargo test -p dartscope-cli --locked --quiet
      - name: Commit cleanup
        run: |
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "chore: harden DS-CLI-003 finalization cleanup"
          git push origin HEAD:main
