name: Finalize Full Audit And Roadmap

on:
  push:
    branches: [main]
    paths:
      - ".dartscope-audit-fix/trigger.txt"
      - ".github/workflows/audit-roadmap-finalize.yml"

permissions:
  contents: write
  statuses: write

concurrency:
  group: dartscope-audit-roadmap-finalization
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      STATUS_CONTEXT: dartscope/audit-roadmap-finalization
    steps:
      - name: Check out audit staging commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Verify staging head
        run: |
          git fetch origin main
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test "$(git rev-parse origin/main)" = "$GITHUB_SHA"
      - name: Publish pending status
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=pending \
            -f context="${STATUS_CONTEXT}" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
      - name: Apply audited corrections and roadmap
        run: |
          python3 .dartscope-audit-fix/apply.py
          chmod +x tools/publish-crates.sh tools/check-repository-consistency.py
          git update-index --chmod=+x tools/publish-crates.sh
      - name: Install exact Rust 1.95
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - name: Validate scripts and repository facts
        run: |
          python3 -m py_compile tools/check-release-packages.py tools/check-repository-consistency.py
          bash -n tools/publish-crates.sh
          test -x tools/publish-crates.sh
          python3 tools/check-repository-consistency.py
      - name: Check formatting and whitespace
        run: |
          cargo fmt --all -- --check
          git diff --check
      - name: Check workspace and isolated features
        run: |
          cargo check --workspace --all-targets --all-features --locked
          cargo check -p dartscope --no-default-features --locked
          for feature in parse resolve index lints json flutter; do
            cargo check -p dartscope --no-default-features --features "${feature}" --locked
          done
      - name: Test all workspace targets and features
        run: cargo test --workspace --all-targets --all-features --locked --quiet
      - name: Run all-feature Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Build all-feature documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --no-deps --locked
      - name: Validate all release archives
        run: python3 tools/check-release-packages.py
      - name: Commit audited non-workflow corrections
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add CHANGELOG.md docs/release-process.md docs/development/dartscope-library-plan.md \
            tools/check-repository-consistency.py tools/publish-crates.sh
          git commit -m "fix: record full audit and harden release path"
          git push origin HEAD:main
      - name: Publish success status
        run: |
          final_sha="$(git rev-parse HEAD)"
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${final_sha}" \
            -f state=success \
            -f context="${STATUS_CONTEXT}" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
      - name: Publish failure status
        if: failure()
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=failure \
            -f context="${STATUS_CONTEXT}" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

