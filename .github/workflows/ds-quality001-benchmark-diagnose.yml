name: Diagnose DS-QUALITY-001 Benchmark Reporting

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

concurrency:
  group: ds-quality001-benchmark-diagnose
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.event.issue.title == '[internal] diagnose DS-QUALITY-001 benchmark reporting'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Apply reviewed payload in worktree
        env:
          EXPECTED_SHA256: beb7656bac17b0360de973a1457d1c20f0e8da1d7db76f24980b55af9caa3fbf
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          import hashlib
          import os
          from pathlib import Path

          encoded = ''.join(Path('tools/ds_quality001_benchmark_payload.b64').read_text().split())
          payload = base64.b64decode(encoded, validate=True)
          digest = hashlib.sha256(payload).hexdigest()
          if digest != os.environ['EXPECTED_SHA256']:
              raise SystemExit(f'payload sha256 mismatch: {digest}')
          archive = Path(os.environ['RUNNER_TEMP']) / 'payload.tar.gz'
          archive.write_bytes(payload)
          PY
          mkdir -p "$RUNNER_TEMP/payload"
          tar -xzf "$RUNNER_TEMP/payload.tar.gz" -C "$RUNNER_TEMP/payload"
          python3 "$RUNNER_TEMP/payload/apply.py" "$GITHUB_WORKSPACE" "$RUNNER_TEMP/payload"
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Run reporter and retain structured failure
        id: reporter
        env:
          FEATURE_BASE: 87dee903ff9215d7b63238476a100cb90d3aa701
        shell: bash
        run: |
          set +e
          git worktree add "$RUNNER_TEMP/benchmark-baseline" "$FEATURE_BASE"
          python3 tools/report_benchmark_regressions.py \
            --baseline "$RUNNER_TEMP/benchmark-baseline" \
            --candidate "$GITHUB_WORKSPACE" \
            --markdown "$RUNNER_TEMP/benchmark-report.md" \
            --json "$RUNNER_TEMP/benchmark-report.json" \
            --samples 3 \
            >"$RUNNER_TEMP/benchmark-command.log" 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Comment exact diagnostic
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          REPORT_STATUS: ${{ steps.reporter.outputs.status }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const temp = process.env.RUNNER_TEMP;
            const read = (name) => {
              const target = path.join(temp, name);
              return fs.existsSync(target) ? fs.readFileSync(target, 'utf8') : '<missing>';
            };
            const json = read('benchmark-report.json');
            const log = read('benchmark-command.log');
            const body = `reporter_exit=${process.env.REPORT_STATUS}\n\njson:\n\`\`\`json\n${json.slice(-12000)}\n\`\`\`\n\nlog_tail:\n\`\`\`text\n${log.slice(-12000)}\n\`\`\``;
            await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body});
            await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, state: 'closed'});
