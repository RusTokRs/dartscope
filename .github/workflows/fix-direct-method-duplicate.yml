name: Direct method duplicate fix

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  verify:
    if: github.head_ref == 'agent/fix-direct-method-duplicate'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: agent/fix-direct-method-duplicate
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy
      - name: Remove duplicate block and format
        run: |
          set -euo pipefail
          python3 .github/scripts/fix_direct_method_duplicate.py
          cargo +1.95.0 fmt --all
      - name: Commit product fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            crates/dartscope-index/src/navigation.rs \
            crates/dartscope-index/tests/navigation_methods.rs
          if ! git diff --cached --quiet; then
            git commit -m "fix: deduplicate direct method resolver"
            git push origin HEAD:agent/fix-direct-method-duplicate
          fi
      - name: Verify strictly
        run: |
          set -euo pipefail
          cargo +1.95.0 fmt --all -- --check
          cargo +1.95.0 check --workspace --all-targets --locked
          cargo +1.95.0 check -p dartscope --all-features --locked
          cargo +1.95.0 test --workspace --locked --quiet
          cargo +1.95.0 clippy --workspace --all-targets --locked -- -D warnings
