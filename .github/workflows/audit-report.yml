name: One-Shot Audit Report

on:
  push:
    branches: [main]
    paths:
      - ".dartscope-audit-trigger"

permissions:
  contents: write

concurrency:
  group: one-shot-audit-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - name: Run audit commands
        shell: bash
        run: |
          set -u
          mkdir -p /tmp/dartscope-audit
          run_check() {
            name="$1"
            shift
            set +e
            "$@" >"/tmp/dartscope-audit/${name}.log" 2>&1
            code=$?
            set -e
            printf '%s\n' "$code" >"/tmp/dartscope-audit/${name}.rc"
          }
          set -e
          run_check rustc rustc --version
          run_check fmt cargo fmt --all -- --check
          run_check check cargo check --workspace --all-targets --all-features --locked
          run_check test cargo test --workspace --all-features --all-targets --locked --quiet
          run_check clippy cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          set +e
          RUSTDOCFLAGS='-D warnings' cargo doc --workspace --all-features --no-deps --locked > /tmp/dartscope-audit/rustdoc.log 2>&1
          echo $? > /tmp/dartscope-audit/rustdoc.rc
          set -e
          run_check package python3 tools/check-release-packages.py
          run_check duplicates cargo tree --workspace --all-features --duplicates
          run_check install_audit cargo install cargo-audit --locked
          run_check audit cargo audit
          run_check install_machete cargo install cargo-machete --locked
          run_check machete cargo machete
      - name: Run consistency audit
        continue-on-error: true
        run: |
          python3 - <<'PY' > /tmp/dartscope-audit/consistency.log 2>&1
          from pathlib import Path
          import json
          import subprocess
          import tomllib

          findings = []
          metadata = json.loads(subprocess.check_output([
              'cargo', 'metadata', '--locked', '--no-deps', '--format-version', '1'
          ], text=True))
          packages = {p['name']: p for p in metadata['packages']}
          order = [line.strip() for line in Path('tools/release-crates.txt').read_text().splitlines()
                   if line.strip() and not line.lstrip().startswith('#')]
          if len(packages) != 9:
              findings.append(f'workspace package count is {len(packages)}, expected 9')
          if set(packages) != set(order):
              findings.append('release order and workspace package sets differ')

          plan = Path('docs/development/dartscope-library-plan.md').read_text(encoding='utf-8')
          for text, reason in [
              ('Rust workspace and eight crates', 'workspace now has nine crates'),
              ('Lint/rule engine | planned | crate not created', 'lint engine is verified'),
              ('Baseline reviewed on 2026-07-16.', 'baseline date predates completed 0.1 work'),
          ]:
              if text in plan:
                  findings.append(f'stale roadmap text: {text!r}: {reason}')

          root = tomllib.loads(Path('Cargo.toml').read_text(encoding='utf-8'))
          version = str(root['workspace']['package']['version'])
          tag = f'v{version}'
          released = f'## [{version}] - ' in Path('CHANGELOG.md').read_text(encoding='utf-8')
          tag_exists = subprocess.run(['git', 'rev-parse', '--verify', '--quiet', f'refs/tags/{tag}']).returncode == 0
          if released and not tag_exists:
              findings.append(f'CHANGELOG marks {version} released but {tag} is absent')

          mutable = []
          ignored = {'audit-report.yml', 'full-repository-audit.yml', 'repository-audit-observable.yml'}
          for workflow in sorted(Path('.github/workflows').glob('*.*ml')):
              if workflow.name in ignored:
                  continue
              for line_no, line in enumerate(workflow.read_text(encoding='utf-8').splitlines(), 1):
                  text = line.strip()
                  if text.startswith('uses:') and '@' in text:
                      ref = text.rsplit('@', 1)[1]
                      if len(ref) != 40 or any(c not in '0123456789abcdefABCDEF' for c in ref):
                          mutable.append(f'{workflow}:{line_no}: {text}')
          if mutable:
              findings.append(f'{len(mutable)} permanent Action references use mutable tags/branches')
              print('MUTABLE ACTION REFERENCES:')
              print('\n'.join(mutable))

          print('\nFINDINGS:')
          for finding in findings or ['none']:
              print(f'- {finding}')
          if findings:
              raise SystemExit(1)
          PY
          echo $? > /tmp/dartscope-audit/consistency.rc
      - name: Write audit report
        if: always()
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os

          audit = Path('/tmp/dartscope-audit')
          names = [
              'rustc', 'fmt', 'check', 'test', 'clippy', 'rustdoc', 'package',
              'duplicates', 'install_audit', 'audit', 'install_machete', 'machete',
              'consistency',
          ]
          lines = [
              '# Temporary DartScope Full Audit Report',
              '',
              f'- audited commit: `{os.environ["GITHUB_SHA"]}`',
              f'- workflow run: `{os.environ["GITHUB_RUN_ID"]}`',
              '',
              '## Exit Codes',
              '',
          ]
          for name in names:
              rc_path = audit / f'{name}.rc'
              rc = rc_path.read_text().strip() if rc_path.exists() else 'missing'
              lines.append(f'- `{name}`: `{rc}`')
          for name in names:
              log_path = audit / f'{name}.log'
              if not log_path.exists():
                  continue
              text = log_path.read_text(encoding='utf-8', errors='replace')
              if len(text) > 40000:
                  text = text[-40000:]
                  text = '[tail only]\n' + text
              lines.extend(['', f'## {name}', '', '```text', text.rstrip(), '```'])
          Path('.dartscope-audit-results.md').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
      - name: Commit audit report
        if: always()
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .dartscope-audit-results.md
          git commit -m "ci: record full repository audit"
          git push origin HEAD:main
