name: Apply package config metadata slice

# Triggered through the Contents API so the staged Git Data commit receives a push event.
on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: apply-package-config-metadata
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply verified metadata patch
        shell: bash
        run: |
          set -euo pipefail
          patch=.github/package-config-metadata.patch
          workflow=.github/workflows/apply-package-config-metadata.yml
          test -f "${patch}"
          echo "bb87827f7a8786fd2710222f84d72c360a952b41e999444db69bc1faa1d89519  ${patch}" \
            | sha256sum --check --strict
          git apply --check "${patch}"
          git apply "${patch}"
          git rm "${patch}" "${workflow}"
          git add crates/dartscope-core/src/lib.rs crates/dartscope-resolve/src/lib.rs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: validate package config metadata"
          git push origin HEAD:main
