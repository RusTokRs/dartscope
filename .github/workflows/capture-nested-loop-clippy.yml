name: Capture Nested Loop Clippy

on:
  pull_request:

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal --component clippy
      - name: Capture Clippy diagnostics
        run: |
          set +e
          cargo clippy --workspace --all-targets --locked -- -D warnings \
            > nested-loop-clippy.txt 2>&1
          status=$?
          echo "status=$status" >> nested-loop-clippy.txt
          cat nested-loop-clippy.txt
      - name: Upload diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nested-loop-clippy
          path: nested-loop-clippy.txt
          if-no-files-found: error
          retention-days: 1
