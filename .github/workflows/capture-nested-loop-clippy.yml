name: Validate Nested Loop Clippy Cleanup

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Remove obsolete helper
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/dartscope-parse/src/lexical_regions/controls.rs')
          source = path.read_text(encoding='utf-8')
          obsolete = '''fn is_control_keyword(value: &str) -> bool {
              matches!(value, "if" | "for" | "while" | "do" | "switch" | "try")
          }

          '''
          if source.count(obsolete) != 1:
              raise SystemExit('obsolete control-keyword helper not found exactly once')
          path.write_text(source.replace(obsolete, '', 1), encoding='utf-8')
          PY
      - name: Install Rust 1.95
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy
      - name: Validate focused tests and Clippy
        run: |
          rustfmt +1.95.0 --edition 2024 crates/dartscope-parse/src/lexical_regions/controls.rs
          cargo +1.95.0 test -p dartscope-parse -p dartscope-index --locked
          cargo +1.95.0 clippy --workspace --all-targets --locked -- -D warnings
          git diff --check
      - name: Upload validated source
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: validated-nested-loop-controls
          path: crates/dartscope-parse/src/lexical_regions/controls.rs
          if-no-files-found: error
          retention-days: 1
