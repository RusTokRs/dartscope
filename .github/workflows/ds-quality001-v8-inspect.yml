name: Inspect DS-QUALITY-001 Dependency Gate V8

on:
  issues:
    types: [opened]

permissions:
  contents: write
  actions: read
  issues: write

jobs:
  inspect:
    if: github.event.issue.title == '[internal] inspect DS-QUALITY-001 dependency gate v8'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
      - name: Remove one-shot inspector
        shell: bash
        run: |
          rm -f .github/workflows/ds-quality001-v8-inspect.yml
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "ci: inspect DS-QUALITY-001 dependency gate v8"
          git push origin HEAD:main
      - name: Report latest V8 run
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const response = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ds-quality001-dependency-v8-finalize.yml',
              event: 'workflow_dispatch',
              per_page: 5,
            });
            const run = response.data.workflow_runs[0];
            const body = run
              ? `run_id=${run.id}\nstatus=${run.status}\nconclusion=${run.conclusion ?? ''}\nhead_sha=${run.head_sha}\nurl=${run.html_url}`
              : 'No V8 workflow_dispatch run found.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
