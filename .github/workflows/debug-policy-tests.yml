name: Apply Blocking Quality Contracts

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Apply product contract updates
        run: |
          python3 - <<'PY'
          from pathlib import Path

          report_path = Path("tools/report_benchmark_regressions.py")
          report = report_path.read_text(encoding="utf-8")
          class_anchor = '''class BenchmarkError(RuntimeError):
              pass
          '''
          helper = '''def exit_code_for_reports(reports: list[WorkloadReport]) -> int:
              return 2 if any(report.classification == "possible regression" for report in reports) else 0


          '''
          if class_anchor not in report:
              raise SystemExit("benchmark helper anchor not found")
          report = report.replace(class_anchor, helper + class_anchor, 1)
          old_markdown = '''        "> Timing classifications are informational. The job compares base and head on the same runner,",
                  "> alternates execution order, and uses medians plus median absolute deviation. No absolute",
                  "> hosted-runner duration and no measured slowdown can fail the blocking `dartscope/ci` status.",
          '''
          new_markdown = '''        "> The job compares base and head on the same runner, alternates execution order, and uses",
                  "> medians plus median absolute deviation. No absolute hosted-runner duration is enforced.",
                  "> A `possible regression` classification fails this blocking benchmark gate.",
          '''
          if old_markdown not in report:
              raise SystemExit("benchmark markdown anchor not found")
          report = report.replace(old_markdown, new_markdown, 1)
          report = report.replace(
              '"The non-blocking benchmark reporter could not complete.\\n\\n"',
              '"The blocking benchmark reporter could not complete.\\n\\n"',
              1,
          )
          report = report.replace(
              '                    "status": "ok",\n',
              '                    "status": "regression" if exit_code_for_reports(reports) else "ok",\n',
              1,
          )
          return_anchor = '''        )
                  return 0
              except (BenchmarkError, OSError, subprocess.SubprocessError) as error:
          '''
          if return_anchor not in report:
              raise SystemExit("benchmark return anchor not found")
          report_path.write_text(
              report.replace(
                  return_anchor,
                  '''        )
                  return exit_code_for_reports(reports)
              except (BenchmarkError, OSError, subprocess.SubprocessError) as error:
          ''',
                  1,
              ),
              encoding="utf-8",
          )

          Path("tools/tests/test_report_benchmark_regressions.py").write_text(
              '''from __future__ import annotations

          import importlib.util
          from pathlib import Path
          import sys
          import unittest

          MODULE_PATH = Path(__file__).resolve().parents[1] / "report_benchmark_regressions.py"
          SPEC = importlib.util.spec_from_file_location("benchmark_regressions", MODULE_PATH)
          assert SPEC is not None and SPEC.loader is not None
          MODULE = importlib.util.module_from_spec(SPEC)
          sys.modules[SPEC.name] = MODULE
          SPEC.loader.exec_module(MODULE)


          class BenchmarkRegressionTests(unittest.TestCase):
              def report(self, classification: str = "stable") -> MODULE.WorkloadReport:
                  return MODULE.WorkloadReport(
                      workload="parse",
                      baseline_median_ns=1_000_000,
                      candidate_median_ns=1_100_000,
                      delta_percent=10.0,
                      baseline_noise=0.01,
                      candidate_noise=0.02,
                      paired_median_ratio=1.1,
                      supporting_pairs=2,
                      samples=7,
                      classification=classification,
                      comparable=True,
                      baseline_units=10,
                      candidate_units=10,
                      baseline_digest=20,
                      candidate_digest=20,
                  )

              def test_sustained_relative_slowdown_is_reported(self) -> None:
                  classification, paired_median, support = MODULE.classify_samples(
                      [100, 101, 99, 100, 102, 98, 100],
                      [128, 130, 126, 127, 131, 125, 129],
                  )
                  self.assertEqual(classification, "possible regression")
                  self.assertGreaterEqual(paired_median, 1.20)
                  self.assertGreaterEqual(support, 5)

              def test_single_outlier_does_not_create_a_regression(self) -> None:
                  classification, _, _ = MODULE.classify_samples(
                      [100, 100, 100, 100, 100, 100, 100],
                      [100, 101, 99, 100, 300, 100, 99],
                  )
                  self.assertEqual(classification, "stable")

              def test_high_median_absolute_deviation_is_inconclusive(self) -> None:
                  classification, _, _ = MODULE.classify_samples(
                      [70, 90, 100, 110, 130, 150, 170],
                      [100, 130, 150, 180, 210, 250, 300],
                  )
                  self.assertEqual(classification, "inconclusive (noisy)")

              def test_changed_workload_shape_is_not_compared(self) -> None:
                  classification, paired_median, support = MODULE.classify_samples(
                      [100, 100, 100], [200, 200, 200], comparable=False
                  )
                  self.assertEqual(classification, "workload changed")
                  self.assertEqual(paired_median, 1.0)
                  self.assertEqual(support, 0)

              def test_markdown_states_blocking_policy(self) -> None:
                  report = self.report()
                  markdown = MODULE.render_markdown("base", "head", [report])
                  self.assertIn("No absolute", markdown)
                  self.assertIn("`possible regression` classification fails", markdown)
                  self.assertIn("| parse |", markdown)
                  self.assertEqual(MODULE.exit_code_for_reports([report]), 0)

              def test_possible_regression_returns_blocking_exit_code(self) -> None:
                  self.assertEqual(
                      MODULE.exit_code_for_reports([self.report("possible regression")]), 2
                  )


          if __name__ == "__main__":
              unittest.main()
          ''',
              encoding="utf-8",
          )

          Path("tools/tests/test_macos_portability_policy.py").write_text(
              '''from __future__ import annotations

          from pathlib import Path
          import re
          import unittest

          ROOT = Path(__file__).resolve().parents[2]
          CI = ROOT / ".github" / "workflows" / "ci.yml"
          POLICY = ROOT / "docs" / "development" / "macos-portability.md"


          class MacosPortabilityPolicyTests(unittest.TestCase):
              def test_signal_is_pinned_and_blocking(self) -> None:
                  text = CI.read_text(encoding="utf-8")
                  match = re.search(
                      r"(?ms)^  macos_portability:\n(?P<body>.*?)(?=^  [a-zA-Z0-9_]+:|\\Z)", text
                  )
                  self.assertIsNotNone(match)
                  body = match.group("body")
                  self.assertNotIn("continue-on-error", body)
                  self.assertIn("runs-on: macos-15", body)
                  self.assertIn("timeout-minutes: 30", body)
                  self.assertIn("cargo +1.95.0 check --workspace --all-targets --locked", body)
                  self.assertIn("cargo +1.95.0 test --workspace --locked --quiet", body)
                  self.assertIn("cargo +1.95.0 package --workspace", body)
                  self.assertIn('test "$archive_count" = "9"', body)

              def test_signal_is_included_in_aggregate_status(self) -> None:
                  text = CI.read_text(encoding="utf-8")
                  report = re.search(
                      r"(?ms)^  report:\n(?P<body>.*?)(?=^  [a-zA-Z0-9_]+:|\\Z)", text
                  )
                  self.assertIsNotNone(report)
                  body = report.group("body")
                  self.assertIn("macos_portability", body)
                  self.assertIn("benchmark_report", body)

              def test_blocking_policy_is_explicit(self) -> None:
                  text = POLICY.read_text(encoding="utf-8")
                  for fragment in (
                      "blocking macOS portability gate",
                      "`macos-15`",
                      "fails the CI workflow",
                      "must not be converted into code exceptions or weaker assertions",
                      "runner-image migration requires",
                  ):
                      self.assertIn(fragment, text)


          if __name__ == "__main__":
              unittest.main()
          ''',
              encoding="utf-8",
          )

          Path("docs/development/macos-portability.md").write_text(
              '''---
          id: doc://docs/development/macos-portability.md
          kind: development_policy
          language: en
          source_language: en
          status: active
          ---

          # macOS Portability Gate

          DartScope runs a blocking macOS portability gate in permanent CI. The gate detects Apple-platform
          build, test, filesystem, archive, and arm64 assumptions and fails the CI workflow when the repository
          no longer satisfies its macOS release contract.

          ## Current Gate

          The job uses the versioned `macos-15` GitHub-hosted runner label rather than the moving
          `macos-latest` alias. It records `sw_vers`, `uname`, and the exact Rust compiler identity in the step
          summary, then runs:

          1. `cargo +1.95.0 check --workspace --all-targets --locked`;
          2. `cargo +1.95.0 test --workspace --locked --quiet`;
          3. `cargo +1.95.0 package --workspace --locked --allow-dirty --no-verify`, followed by an exact
             nine-archive count.

          The job has a 30-minute timeout, does not use `continue-on-error`, and is included in the aggregate
          `dartscope/ci` status together with the benchmark regression gate. A macOS failure therefore blocks
          merge and default-branch release readiness.

          ## Historical Observation

          The pinned `macos-15` signal was first validated in pull-request CI run `29698405538` on July 19,
          2026. Environment capture, all-target workspace checking, the full workspace test suite, and the exact
          nine-archive package contract passed. The former non-blocking observation phase was retired by the
          reviewed DS-BUG-005 remediation because declared portability regressions must not be masked by a green
          pipeline.

          ## Failure Triage

          Every failure must be classified before changing the gate:

          - **product defect:** reproducible source, test, path, archive, target, or dependency behavior;
          - **runner-image drift:** an image or preinstalled-tool change outside the repository;
          - **service instability:** provisioning, networking, registry, or hosted-runner outage;
          - **unsupported assumption:** a documented platform limitation that requires an explicit product
            decision rather than a retry or suppression.

          Infrastructure failures may be retried, but they must not be converted into code exceptions or weaker
          assertions. Product defects remain open until fixed or explicitly rejected with rationale.

          ## Blocking Policy

          The gate remains blocking unless a reviewed policy change documents a narrower supported platform
          contract. Platform-specific ignores, dependency exceptions, reduced test sets, archive bypasses, and
          job-level `continue-on-error` are not acceptable substitutes for fixing a reproducible defect.

          A runner-image migration requires a reviewed compatibility report showing that the replacement image
          provides equivalent or stronger evidence. Queue time and absolute wall-clock duration are not reasons
          to weaken the gate.
          ''',
              encoding="utf-8",
          )
          PY
          rm .github/workflows/debug-policy-tests.yml
      - name: Validate product contracts
        run: |
          python3 -m unittest discover -s tools/tests -p 'test_*.py' -v
          python3 tools/check-workflow-policy.py
          GOBIN="$RUNNER_TEMP/actionlint-bin" go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          "$RUNNER_TEMP/actionlint-bin/actionlint" -color
          git diff --check
      - name: Commit verified product changes
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            docs/development/macos-portability.md \
            tools/report_benchmark_regressions.py \
            tools/tests/test_macos_portability_policy.py \
            tools/tests/test_report_benchmark_regressions.py
          git add -u .github/workflows/debug-policy-tests.yml
          git commit -m "Make release quality contracts blocking"
          git push origin "HEAD:${HEAD_BRANCH}"
