name: Debug Workflow Policy Tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run tools tests
        id: tests
        continue-on-error: true
        run: python3 -m unittest discover -s tools/tests -p 'test_*.py' -v > policy-test.log 2>&1
      - name: Upload tools test log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: policy-test-log
          path: policy-test.log
          if-no-files-found: error
          retention-days: 1
      - name: Preserve test status
        if: steps.tests.outcome != 'success'
        run: exit 1
