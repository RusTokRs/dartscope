name: Rustfmt Capture

on:
  pull_request:

permissions:
  contents: read

jobs:
  capture:
    name: Capture rustfmt patch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install Rust 1.95 with rustfmt
        run: rustup toolchain install 1.95.0 --profile minimal --component rustfmt
      - name: Capture formatting changes
        run: |
          cargo +1.95.0 fmt --all
          git diff -- \
            crates/dartscope-parse/src/lib.rs \
            crates/dartscope-parse/src/project_input.rs \
            crates/dartscope-parse/tests/project_input_paths.rs \
            > rustfmt.patch
          test -s rustfmt.patch
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: rustfmt-patch
          path: rustfmt.patch
          if-no-files-found: error
          retention-days: 1
