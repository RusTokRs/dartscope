name: Diagnose DS-INDEX-005 Cache Baseline Apply

on:
  issues:
    types: [opened]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.issue.title == '[internal] DS-INDEX-005 cache baseline apply diagnostic'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
      - name: Capture apply output only
        shell: bash
        run: |
          set +e
          git show 8dd4ba68eccdc284af567a55d0a2d1a0b4c82519:tools/ds_index005_cache_baseline_apply.py > /tmp/apply.py
          python3 /tmp/apply.py > /tmp/apply.log 2>&1
          STATUS=$?
          git reset --hard HEAD
          rm -f .github/workflows/ds-index005-cache-baseline-apply-diagnostic.yml
          mkdir -p docs/development
          {
            echo '---'
            echo 'id: doc://docs/development/ds-index005-cache-baseline-apply-diagnostic.md'
            echo 'kind: verification_report'
            echo 'language: en'
            echo 'source_language: en'
            echo 'status: active'
            echo '---'
            echo
            echo '# DS-INDEX-005 Cache Baseline Apply Diagnostic'
            echo
            echo "Apply exit: \`$STATUS\`."
            echo
            echo '```text'
            tail -120 /tmp/apply.log
            echo '```'
          } > docs/development/ds-index005-cache-baseline-apply-diagnostic.md
          git config user.name "dartscope-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "ci: capture DS-INDEX-005 cache baseline apply diagnostic"
          git push origin HEAD:main
      - name: Close trigger
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, state: 'closed'});
