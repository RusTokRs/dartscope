name: Apply Bound Symlink Reads

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Bind reads to validated targets
        run: |
          printf '%s' '' | base64 --decode | python3
          rm .github/workflows/apply-bound-symlink-reads.yml
      - name: Format and test CLI
        run: |
          rustup toolchain install 1.95.0 --profile minimal --component rustfmt
          rustfmt +1.95.0 --edition 2024 crates/dartscope-cli/src/main.rs
          cargo +1.95.0 test -p dartscope-cli --locked
          git diff --check
      - name: Commit verified change
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/dartscope-cli/src/main.rs
          git add -u .github/workflows/apply-bound-symlink-reads.yml
          git commit -m "Bind CLI symlink reads to validated targets"
          git push origin "HEAD:${HEAD_BRANCH}"
